id: 07-security/03-pod-security
title: "Pod security"
module: security
order: 3
estimated_minutes: 10
intro: |
  # Pod security

  A container is not a strong sandbox. If a Pod runs as **root**
  and mounts the host disk, a bad app can hurt the whole node.

  Small rules that make Pods safer:
  - **Do not run as root.** Set `runAsNonRoot: true` and pick a
    user ID like `1000`.
  - **Read-only root filesystem.** Set `readOnlyRootFilesystem:
    true`. The container can only write to volumes you allow.
  - **Drop capabilities.** Linux gives root many powers ("caps").
    Drop them all and only add the ones you truly need.
  - **No `privileged: true`.** That mode gives the container full
    host access.

  Kubernetes has a feature called **Pod Security Admission** to
  enforce a security level for a namespace: `privileged`,
  `baseline`, or `restricted`.

  This lesson is for reading. Later lessons will build Pods with
  these settings.
task: |
  No task. Press `c`.
cheat: |
  ### Pod security
  Add to `spec.containers[*].securityContext`:
  ```yaml
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
      # add: ["NET_BIND_SERVICE"]     # only if truly needed
  ```
  - Never set `privileged: true` unless you know why.
  - **Pod Security Admission** enforces a level per namespace:
    ```
    kubectl label ns NS pod-security.kubernetes.io/enforce=restricted
    ```
    Levels: `privileged`, `baseline`, `restricted`.
