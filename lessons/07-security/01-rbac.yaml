id: 07-security/01-rbac
title: "RBAC — who can do what"
module: security
order: 1
estimated_minutes: 12
intro: |
  # RBAC

  **RBAC** means *Role-Based Access Control*. It answers the
  question: *"who can do what on the cluster?"*.

  Four small ideas:
  - **Role** — a list of allowed actions in **one namespace**.
    Example: *"can read Pods in `dev`"*.
  - **ClusterRole** — same, but for the **whole cluster**.
  - **RoleBinding** — link a Role to a user (or group, or service
    account) in one namespace.
  - **ClusterRoleBinding** — same, cluster-wide.

  Rule of thumb:
  - Human user? Usually a Role + RoleBinding per namespace.
  - App inside the cluster? Usually a **ServiceAccount** + Role +
    RoleBinding.
  - Cluster admin? ClusterRole + ClusterRoleBinding.
task: |
  Create a Role that can only **read Pods** in the default
  namespace, and bind it to a ServiceAccount named `reader`.

  ```
  kubectl create serviceaccount reader
  kubectl create role pod-reader --verb=get,list,watch --resource=pods
  kubectl create rolebinding reader-binds \
    --role=pod-reader --serviceaccount=default:reader
  ```

  Check the Role:

  ```
  kubectl get role pod-reader -o yaml
  ```

  Then press `c`.

  Clean up:
  `kubectl delete rolebinding reader-binds; kubectl delete role pod-reader; kubectl delete sa reader`
hint: "kubectl auth can-i list pods --as=system:serviceaccount:default:reader  -- should say yes"
requires: [cluster]
check:
  type: command
  cmd: "kubectl get role pod-reader -o jsonpath='{.rules[0].verbs}'"
  expect: "list"
  timeout_seconds: 15
