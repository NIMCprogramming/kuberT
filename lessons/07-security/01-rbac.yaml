id: 07-security/01-rbac
title: "RBAC — who can do what"
module: security
order: 1
estimated_minutes: 20
intro: |
  # RBAC

  **RBAC** = *Role-Based Access Control*. It answers:
  *"who can do what on the cluster?"*.

  ## Four small ideas

  - **Role** — a list of allowed actions in **one namespace**.
  - **ClusterRole** — same, but for the **whole cluster**.
  - **RoleBinding** — link a Role to a **subject** (user, group,
    ServiceAccount) in one namespace.
  - **ClusterRoleBinding** — same, cluster-wide.

  A Role by itself does **nothing**. It only becomes real when a
  RoleBinding attaches it to a subject.

  ## Subjects

  - **User** — a human (identified by client cert or token).
  - **Group** — a list of users.
  - **ServiceAccount (SA)** — an identity for **Pods**. When a
    Pod calls the Kubernetes API, it uses its SA's token.

  ## Example commands (reference)

  ```
  kubectl create serviceaccount NAME
  kubectl create role NAME --verb=V1,V2 --resource=R1,R2
  kubectl create rolebinding NAME --role=ROLE --serviceaccount=NS:SA_NAME
  ```

  Break the role command apart:
  - `create role` — kind to create.
  - `NAME` — the Role name.
  - `--verb=V1,V2` — allowed **actions**: `get, list, watch,
    create, update, patch, delete`.
  - `--resource=R1,R2` — resources: `pods, services, deployments...`

  Break the rolebinding command apart:
  - `create rolebinding` — a RoleBinding.
  - `NAME` — the RoleBinding name.
  - `--role=ROLE` — which Role to grant.
  - `--serviceaccount=NS:SA_NAME` — grant it to a
    ServiceAccount. The syntax is `NAMESPACE:NAME`.

  ## The magic check command

  ```
  kubectl auth can-i VERB RESOURCE --as=system:serviceaccount:NS:SA_NAME
  ```
  Prints `yes` or `no`.
task: |
  **Your goal:** build a limited identity and prove what it can
  and cannot do.

  Requirements:
  1. Create a ServiceAccount named **`viewer`** in namespace
     `default`.
  2. Create a Role named **`ro-svc`** that can only **get** and
     **list** on **services** (nothing more).
  3. Create a RoleBinding named **`viewer-ro-svc`** that grants
     the `ro-svc` Role to the `viewer` ServiceAccount.
  4. Verify with `kubectl auth can-i`:
     - `list services` as viewer → **yes**
     - `get services` as viewer → **yes**
     - `list pods` as viewer → **no**
     - `delete services` as viewer → **no**

  Then press `c`.

  Clean up later: delete the RoleBinding, Role, and ServiceAccount.
hint: |
  - SA: `kubectl create serviceaccount viewer`
  - Role: `kubectl create role ro-svc --verb=get,list --resource=services`
  - Binding: `kubectl create rolebinding viewer-ro-svc --role=ro-svc --serviceaccount=default:viewer`
  - Check "as": `kubectl auth can-i list services --as=system:serviceaccount:default:viewer`
  - See ALL allowed actions: `kubectl auth can-i --list --as=system:serviceaccount:default:viewer`
requires: [cluster]
cheat: |
  ### RBAC
  Four kinds:
  - **Role** / **ClusterRole** — a list of allowed actions.
  - **RoleBinding** / **ClusterRoleBinding** — link a Role to a subject.

  **Subjects:** User, Group, ServiceAccount.

  **Verbs:** `get, list, watch, create, update, patch, delete, deletecollection`.

  **Commands:**
  - `kubectl create sa NAME`
  - `kubectl create role NAME --verb=... --resource=...`
  - `kubectl create clusterrole NAME --verb=... --resource=...`
  - `kubectl create rolebinding NAME --role=R --serviceaccount=NS:SA`
  - `kubectl create clusterrolebinding NAME --clusterrole=R --serviceaccount=NS:SA`

  **Test what an identity can do:**
  - `kubectl auth can-i VERB RESOURCE --as=USER`
  - `kubectl auth can-i --list --as=system:serviceaccount:NS:SA`
check:
  type: multiple
  checks:
    - type: command
      cmd: "kubectl get role ro-svc -o jsonpath='{.rules[0].resources}'"
      expect: "services"
    - type: command
      cmd: "kubectl auth can-i list services --as=system:serviceaccount:default:viewer"
      expect: "yes"
    - type: command
      cmd: "kubectl auth can-i list pods --as=system:serviceaccount:default:viewer"
      expect: "no"
