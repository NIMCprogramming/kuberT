id: 05-configuration/01-configmaps
title: "ConfigMaps"
module: configuration
order: 1
estimated_minutes: 20
intro: |
  # ConfigMaps

  A **ConfigMap** stores settings for your app inside the cluster:
  URLs, feature flags, small config files.

  Your Docker image stays the same. Only the ConfigMap changes
  when settings change.

  A Pod can read a ConfigMap in two ways:
  1. As **environment variables**.
  2. As **files** mounted inside the container.

  Do **not** put passwords or tokens in a ConfigMap — use a
  **Secret** for that.

  ## Three ways to make one

  ```
  kubectl create configmap NAME --from-literal=KEY=VALUE
  kubectl create configmap NAME --from-file=path/to/file.txt
  kubectl create configmap NAME --from-env-file=vars.env
  ```

  Break `--from-literal=GREETING=hello` apart:
  - `--from-literal=` — value is a **literal string** on the CLI.
  - `GREETING` — the **key name** in the ConfigMap.
  - `hello` — the **value** for that key.

  Result:
  ```
  data:
    GREETING: hello
  ```

  ## Wiring it into a Pod (env-var pattern)

  ```yaml
  env:
    - name: MY_VAR             # env var name in the container
      valueFrom:
        configMapKeyRef:
          name: CM_NAME        # which ConfigMap
          key:  CM_KEY         # which key
  ```

task: |
  **Your goal:** create a ConfigMap AND make a Pod that actually
  reads it.

  Requirements:
  1. Create a ConfigMap named **`app-config`** with two keys:
     - `GREETING = hola`
     - `LEVEL = info`
  2. Create a Pod named **`cm-user`** using image
     **`busybox`** whose container:
     - has env var `GREETING` from key `GREETING` in `app-config`
     - has env var `LOG_LEVEL` from key `LEVEL` in `app-config`
       (note: env var name is different from the key name)
     - runs `sh -c "echo GREETING=$GREETING LOG_LEVEL=$LOG_LEVEL; sleep 3600"`
     - has `restartPolicy: Never`
  3. Read the Pod logs. You must see one line:
     `GREETING=hola LOG_LEVEL=info`

  Then press `c`.

  Clean up later: delete the Pod and the ConfigMap.
hint: |
  - ConfigMap with many keys in one command:
    `kubectl create configmap app-config --from-literal=GREETING=hola --from-literal=LEVEL=info`
  - The env var name inside the container and the ConfigMap key are two DIFFERENT things. `name: LOG_LEVEL` gives you `$LOG_LEVEL` in the container, `key: LEVEL` says which ConfigMap key to read.
  - Wrap the heredoc in `<<'EOF'` (with quotes) so `$GREETING` and `$LOG_LEVEL` do NOT get expanded before Kubernetes sees them.
  - Verify env from inside: `kubectl exec cm-user -- env | grep -E 'GREETING|LOG_LEVEL'`.
requires: [cluster]
cheat: |
  ### ConfigMaps
  - For **non-secret** settings: URLs, feature flags, config files.
  - Create:
    - `kubectl create configmap NAME --from-literal=KEY=VAL`
    - `kubectl create configmap NAME --from-file=path/to/file`
    - `kubectl create configmap NAME --from-env-file=vars.env`
  - Wire into a Pod as env var:
    ```yaml
    env:
      - name: MY_VAR
        valueFrom:
          configMapKeyRef: { name: NAME, key: KEY }
    ```
  - Wire as files (mount as a Volume):
    ```yaml
    volumes:
      - name: v
        configMap: { name: NAME }
    volumeMounts:
      - { name: v, mountPath: /etc/config }
    ```
  - `kubectl describe cm NAME`  — see all keys.
check:
  type: multiple
  checks:
    - type: command
      cmd: "kubectl get configmap app-config -o jsonpath='{.data.GREETING}'"
      expect: "hola"
    - type: command
      cmd: "kubectl get configmap app-config -o jsonpath='{.data.LEVEL}'"
      expect: "info"
    - type: command
      cmd: "kubectl logs cm-user"
      expect: "GREETING=hola LOG_LEVEL=info"
      timeout_seconds: 60
