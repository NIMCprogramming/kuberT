id: 05-configuration/02-secrets
title: "Secrets"
module: configuration
order: 2
estimated_minutes: 15
intro: |
  # Secrets

  A **Secret** is like a ConfigMap, but for private values:
  passwords, API tokens, TLS keys.

  Kubernetes stores Secret values as **base64** text. Base64 is
  **not encryption** ‚Äî it only makes the value less visible in
  logs and `kubectl` output. In real clusters, admins turn on
  **encryption at rest** so the data is really encrypted on disk.

  A Pod reads a Secret the same way it reads a ConfigMap:
  - as environment variables (`secretKeyRef`)
  - as files mounted inside the container (a volume of type
    `secret`)

  **Rule of thumb:** if it is a password, use a Secret. If it is
  just a setting, use a ConfigMap.

  ## How to make a Secret from the command line

  ```
  kubectl create secret generic NAME --from-literal=KEY=VALUE
  kubectl create secret generic NAME --from-file=path/to/key.txt
  ```

  Let's break `kubectl create secret generic db-cred --from-literal=password=s3cret` apart:
  - `secret` ‚Äî a Kubernetes Secret (not a ConfigMap).
  - `generic` ‚Äî the **type**. `generic` = free-form key/value. Other
    types exist (`tls`, `docker-registry`) with strict fields.
  - `db-cred` ‚Äî the **name** of the Secret.
  - `--from-literal=password=s3cret` ‚Äî key `password`, value
    `s3cret`, typed on the command line.

task: |
  You will do three steps:
  1. Make the Secret.
  2. Run a Pod that reads it as an env var.
  3. Check that the Pod really sees the value.

  ### Step 1 ‚Äî make the Secret

  ```
  kubectl create secret generic db-cred --from-literal=password=s3cret
  ```

  Look at the stored form (base64):
  ```
  kubectl get secret db-cred -o yaml
  ```

  You will see something like `password: czNjcmV0`. That is `s3cret`
  in base64. To decode any base64 value:
  ```
  echo -n czNjcmV0 | base64 -d
  ```

  ### Step 2 ‚Äî make a Pod that uses it

  ```
  cat <<'EOF' | kubectl apply -f -
  apiVersion: v1
  kind: Pod
  metadata:
    name: secret-demo
  spec:
    restartPolicy: Never
    containers:
      - name: c
        image: busybox
        command: ["sh", "-c", "echo DB_PASS=$DB_PASS; sleep 3600"]
        env:
          - name: DB_PASS                # env var name inside the container
            valueFrom:
              secretKeyRef:              # take value FROM a Secret
                name: db-cred            # which Secret
                key: password            # which key
  EOF
  ```

  ### Step 3 ‚Äî check

  Wait a few seconds:
  ```
  kubectl get pod secret-demo
  ```

  Read the logs:
  ```
  kubectl logs secret-demo
  ```

  You should see:
  ```
  DB_PASS=s3cret
  ```

  Then press `c`.

  Clean up:
  ```
  kubectl delete pod secret-demo
  kubectl delete secret db-cred
  ```
hint: "kubectl exec secret-demo -- env | grep DB_PASS"
requires: [cluster]
check:
  type: multiple
  checks:
    - type: command
      cmd: "kubectl get secret db-cred -o jsonpath='{.type}'"
      expect: "Opaque"
    - type: command
      cmd: "kubectl logs secret-demo"
      expect: "DB_PASS=s3cret"
      timeout_seconds: 60
