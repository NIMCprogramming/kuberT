id: 05-configuration/02-secrets
title: "Secrets"
module: configuration
order: 2
estimated_minutes: 18
intro: |
  # Secrets

  A **Secret** is like a ConfigMap, but for private values:
  passwords, API tokens, TLS keys.

  Kubernetes stores Secret values as **base64** text. Base64 is
  **not encryption** — it only makes the value less visible in
  logs. In real clusters, admins turn on **encryption at rest**
  so the data is really encrypted on disk.

  A Pod reads a Secret the same way it reads a ConfigMap:
  - as env vars (`secretKeyRef` instead of `configMapKeyRef`)
  - as files (a Volume of type `secret`)

  ## Break `kubectl create secret generic` apart

  ```
  kubectl create secret generic NAME --from-literal=KEY=VALUE
  ```
  - `secret` — a Kubernetes Secret (not a ConfigMap).
  - `generic` — the **type**. Values are free-form key/value.
    Other types exist (`tls`, `docker-registry`) with strict
    fields.
  - `NAME` — the Secret name.
  - `--from-literal=KEY=VALUE` — one pair.

  ## Wiring it into a Pod

  ```yaml
  env:
    - name: MY_VAR
      valueFrom:
        secretKeyRef:
          name: SECRET_NAME
          key:  SECRET_KEY
  ```

  ## Reading a base64 value

  ```
  kubectl get secret NAME -o jsonpath='{.data.KEY}' | base64 -d
  echo
  ```
task: |
  **Your goal:** create a Secret with a fake DB password and
  prove a Pod can read it.

  Requirements:
  1. Create a Secret named **`db-cred`** with two keys:
     - `username = admin`
     - `password = s3cret`
  2. Create a Pod named **`db-client`** using image
     **`busybox`** whose container:
     - has env var `DB_USER` from key `username` in `db-cred`
     - has env var `DB_PASS` from key `password` in `db-cred`
     - runs `sh -c "echo user=$DB_USER pass=$DB_PASS; sleep 3600"`
     - has `restartPolicy: Never`
  3. Read the Pod logs. They must contain
     `user=admin pass=s3cret`.

  Then press `c`.

  Clean up later: delete the Pod and the Secret.
hint: |
  - Two literals in one command:
    `kubectl create secret generic db-cred --from-literal=username=admin --from-literal=password=s3cret`.
  - Use `<<'EOF'` (with quotes) for the heredoc so `$DB_USER` and `$DB_PASS` are not expanded by your shell.
  - Verify the Secret has type `Opaque`: `kubectl get secret db-cred -o jsonpath='{.type}'`.
requires: [cluster]
cheat: |
  ### Secrets
  - Like ConfigMap but for **passwords, tokens, TLS keys**.
  - Values stored as **base64** (NOT encryption; enable "encryption at rest" for real secrecy).
  - Create:
    - `kubectl create secret generic NAME --from-literal=KEY=VAL`
    - `kubectl create secret tls NAME --cert=path.crt --key=path.key`
    - `kubectl create secret docker-registry NAME --docker-server=... --docker-username=... --docker-password=...`
  - Wire into a Pod:
    ```yaml
    env:
      - name: MY_VAR
        valueFrom:
          secretKeyRef: { name: NAME, key: KEY }
    ```
  - Decode one value: `kubectl get secret NAME -o jsonpath='{.data.KEY}' | base64 -d; echo`
check:
  type: multiple
  checks:
    - type: command
      cmd: "kubectl get secret db-cred -o jsonpath='{.type}'"
      expect: "Opaque"
    - type: command
      cmd: "kubectl logs db-client"
      expect: "user=admin pass=s3cret"
      timeout_seconds: 60
