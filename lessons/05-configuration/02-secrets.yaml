id: 05-configuration/02-secrets
title: "Secrets"
module: configuration
order: 2
estimated_minutes: 10
intro: |
  # Secrets

  A **Secret** is like a ConfigMap, but for values you want to
  keep private:
  - passwords
  - API tokens
  - TLS keys

  Kubernetes stores Secret values as **base64** text. Base64 is
  not encryption — it only makes the value less visible in logs.
  In real clusters, admins turn on **encryption at rest** so the
  data is really encrypted on disk.

  A Pod can use a Secret like a ConfigMap:
  - as environment variables
  - as files in a folder

  **Rule of thumb:** if it is a password, use a Secret. If it is
  just a setting, use a ConfigMap.
task: |
  Create a Secret named `db-cred` with a fake password.

  ```
  kubectl create secret generic db-cred --from-literal=password=s3cret
  ```

  Look at it (note the base64):

  ```
  kubectl get secret db-cred -o yaml
  ```

  Then press `c`.

  Clean up: `kubectl delete secret db-cred`
hint: "To see the real value: kubectl get secret db-cred -o jsonpath='{.data.password}' | base64 -d"
requires: [cluster]
check:
  type: command
  cmd: "kubectl get secret db-cred -o jsonpath='{.type}'"
  expect: "Opaque"
  timeout_seconds: 15
