id: 05-configuration/02-secrets
title: "Secrets"
module: configuration
order: 2
estimated_minutes: 18
learning_goal: "Create a Kubernetes Secret and read its values from a Pod as environment variables."
prerequisites:
  - pods
  - configmap
  - yaml-apply
intro: |
  # Secrets

  A **Secret** is like a ConfigMap, but for private values:
  passwords, API tokens, TLS keys.

  Kubernetes stores Secret values as **base64** text. Base64 is
  **not encryption** — it only makes the value less visible in
  logs. In real clusters, admins turn on **encryption at rest**
  so the data is really encrypted on disk.

  A Pod reads a Secret the same way it reads a ConfigMap:
  - as env vars (`secretKeyRef` instead of `configMapKeyRef`)
  - as files (a Volume of type `secret`)

  ## Break `kubectl create secret generic` apart

  ```
  kubectl create secret generic NAME --from-literal=KEY=VALUE
  ```
  - `secret` — a Kubernetes Secret (not a ConfigMap).
  - `generic` — the **type**. Values are free-form key/value.
    Other types exist (`tls`, `docker-registry`) with strict
    fields.
  - `NAME` — the Secret name.
  - `--from-literal=KEY=VALUE` — one pair.

  ## Wiring it into a Pod

  ```yaml
  env:
    - name: MY_VAR
      valueFrom:
        secretKeyRef:
          name: SECRET_NAME
          key:  SECRET_KEY
  ```

  ## Reading a base64 value

  ```
  kubectl get secret NAME -o jsonpath='{.data.KEY}' | base64 -d
  echo
  ```
warm_up:
  - prompt: "What does a ConfigMap store, and what should you NOT store in it?"
    answer: "Non-secret settings (URLs, feature flags, small config files). Do NOT put passwords or tokens in a ConfigMap."
    kind: recall
    concept: configmap
  - prompt: "In an env var like `name: LOG_LEVEL` + `key: LEVEL`, which one is the key inside the source object?"
    answer: "`key: LEVEL` is the key in the ConfigMap (or Secret). `name: LOG_LEVEL` is the env var name inside the container."
    kind: recall
    concept: configmap
  - prompt: "You edit a YAML in `vim` and save. Nothing changes in the cluster. What did you forget?"
    answer: "`kubectl apply -f FILE.yaml`. Editing the file on disk does not tell Kubernetes anything."
    kind: recall
    concept: yaml-apply
task: |
  **Your goal:** create a Secret with a fake DB password and
  prove a Pod can read it.

  Requirements:
  1. Create a Secret named **`db-cred`** with two keys:
     - `username = admin`
     - `password = s3cret`
  2. Create a Pod named **`db-client`** using image
     **`busybox`** whose container:
     - has env var `DB_USER` from key `username` in `db-cred`
     - has env var `DB_PASS` from key `password` in `db-cred`
     - runs `sh -c "echo user=$DB_USER pass=$DB_PASS; sleep 3600"`
     - has `restartPolicy: Never`
  3. Read the Pod logs. They must contain
     `user=admin pass=s3cret`.

  Then press `c`.

  Clean up later: delete the Pod and the Secret.
hint: |
  - Two literals in one command:
    `kubectl create secret generic db-cred --from-literal=username=admin --from-literal=password=s3cret`.
  - Use `<<'EOF'` (with quotes) for the heredoc so `$DB_USER` and `$DB_PASS` are not expanded by your shell.
  - Verify the Secret has type `Opaque`: `kubectl get secret db-cred -o jsonpath='{.type}'`.
requires: [cluster]
troubleshooting:
  scenario: |
    A teammate says: "Our Secret is safe because Kubernetes
    encrypts it." You run:
    ```
    kubectl get secret db-cred -o jsonpath='{.data.password}' | base64 -d
    ```
    and see `s3cret` on your screen in one second.
  question: "Is the Secret really encrypted? What is base64 doing here?"
  diagnosis: |
    No. **Base64 is not encryption.** It is an encoding — anyone
    with `get secret` rights can decode it in one line.

    To make Secrets truly private:
    - Turn on **encryption at rest** in the API server config
      (`--encryption-provider-config`). Then etcd stores
      encrypted bytes.
    - Restrict `get`/`list` on Secrets with **RBAC** (module 07).
    - Consider a real vault (HashiCorp Vault, cloud KMS) for
      production.
  concept: secret
review_questions:
  - prompt: "Kubernetes stores Secret values as base64. What does that give you?"
    kind: multiple_choice
    options:
      - "Strong encryption"
      - "Only encoding — anyone with `get secret` can decode it"
      - "A password hash"
      - "A random token that changes each read"
    answer: "Only encoding — anyone with `get secret` can decode it."
    concept: secret
  - prompt: "You want a Pod to read `password` from Secret `db-cred` as env `DB_PASS`. Fill in the YAML block."
    kind: recall
    answer: "```yaml\nenv:\n  - name: DB_PASS\n    valueFrom:\n      secretKeyRef:\n        name: db-cred\n        key: password\n```"
    concept: secret
  - prompt: "Your Pod fails with `couldn't find key password in Secret default/db-cred`. What is wrong?"
    kind: debug
    answer: "The Secret does not have a `password` key, or the key name is spelled differently (case matters). Check with `kubectl describe secret db-cred` or `kubectl get secret db-cred -o yaml`."
    concept: secret
  - prompt: "For a TLS certificate + key, which `kubectl create secret` subtype should you use?"
    kind: scenario
    answer: "`kubectl create secret tls NAME --cert=path.crt --key=path.key`. That subtype validates the two files match."
    concept: secret
common_mistakes:
  - mistake: "Thinking base64 == encryption."
    fix: "It is encoding. Enable encryption at rest and lock down RBAC to protect real secrets."
  - mistake: "Committing a `Secret` YAML with the base64 value into git."
    fix: "That value is trivially decoded. Use SealedSecrets, SOPS, or a vault to keep secrets in git safely."
  - mistake: "Using `configMapKeyRef` for a password."
    fix: "Use `secretKeyRef` and a Secret. Same shape, but keeps the value out of ConfigMap listings."
summary: |
  A Secret looks like a ConfigMap but signals: "this is
  sensitive." Values are base64-encoded, not encrypted, so
  protect them with RBAC and encryption at rest. You will wire
  Secrets into every real app from here on.
spaced_hooks:
  - concept: secret
    when: next
  - concept: secret
    when: "2-3"
  - concept: secret
    when: "5-7"
  - concept: secret
    when: capstone
cheat: |
  ### Secrets
  - Like ConfigMap but for **passwords, tokens, TLS keys**.
  - Values stored as **base64** (NOT encryption; enable "encryption at rest" for real secrecy).
  - Create:
    - `kubectl create secret generic NAME --from-literal=KEY=VAL`
    - `kubectl create secret tls NAME --cert=path.crt --key=path.key`
    - `kubectl create secret docker-registry NAME --docker-server=... --docker-username=... --docker-password=...`
  - Wire into a Pod:
    ```yaml
    env:
      - name: MY_VAR
        valueFrom:
          secretKeyRef: { name: NAME, key: KEY }
    ```
  - Decode one value: `kubectl get secret NAME -o jsonpath='{.data.KEY}' | base64 -d; echo`
check:
  type: multiple
  checks:
    - type: command
      cmd: "kubectl get secret db-cred -o jsonpath='{.type}'"
      expect: "Opaque"
    - type: command
      cmd: "kubectl logs db-client"
      expect: "user=admin pass=s3cret"
      timeout_seconds: 60
