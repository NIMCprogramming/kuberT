id: 13-deployment-patterns/06-rolling-updates
title: "Rolling updates and rollbacks"
module: deployment-patterns
order: 6
estimated_minutes: 15
intro: |
  # Rolling update

  A **rolling update** is the default way a Deployment changes
  versions. Kubernetes replaces Pods **a few at a time**, not all
  at once — so the app stays up during the change.

  ## Two knobs

  - **maxUnavailable** — how many old Pods can be down at once.
  - **maxSurge** — how many extra Pods can exist above `replicas`
    during the roll.

  Both accept a number (`1`) or a percent (`25%`). Defaults: `25%`
  and `25%`. For a Deployment with 4 replicas, Kubernetes may
  keep 3 old + 1 new for a moment, then 2 + 2, then 1 + 3, then
  0 + 4.

  ## The YAML

  ```yaml
  spec:
    strategy:
      type: RollingUpdate            # or "Recreate" for kill-all-then-start
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 0            # zero-downtime, slower
  ```

  Setting `maxUnavailable: 0` means "never drop below the wanted
  replica count". Best for critical apps, but a bit slower.

  ## Break the commands apart

  ```
  kubectl set image deploy/web nginx=nginx:1.27
  ```
  - `set image` — change the image of a container.
  - `deploy/web` — the Deployment.
  - `nginx=nginx:1.27` — set container **named `nginx`** to image
    `nginx:1.27`. The name comes from `spec.template.spec.containers[i].name`.

  ```
  kubectl rollout status deploy/web        # wait until done
  kubectl rollout history deploy/web       # list revisions
  kubectl rollout undo deploy/web          # go back one revision
  kubectl rollout undo deploy/web --to-revision=2   # go to a specific one
  ```

  Rollback works because a Deployment keeps a few old ReplicaSets
  around (`spec.revisionHistoryLimit`, default 10).

task: |
  You will do four steps.

  ### Step 1 — start on nginx:1.25

  If you already have `web`, delete it first:
  ```
  kubectl delete deploy web --ignore-not-found
  kubectl create deployment web --image=nginx:1.25 --replicas=2
  kubectl rollout status deploy/web
  ```

  Confirm the image:
  ```
  kubectl get deploy web -o jsonpath='{.spec.template.spec.containers[0].image}'
  echo
  ```

  ### Step 2 — update to nginx:1.27

  ```
  kubectl set image deploy/web nginx=nginx:1.27
  kubectl rollout status deploy/web
  ```

  Watch new Pods appear and old Pods go. Confirm the image
  changed:
  ```
  kubectl get deploy web -o jsonpath='{.spec.template.spec.containers[0].image}'
  echo
  ```

  ### Step 3 — see the history and roll back

  ```
  kubectl rollout history deploy/web
  kubectl rollout undo deploy/web
  kubectl rollout status deploy/web
  ```

  Confirm you are back on `1.25`:
  ```
  kubectl get deploy web -o jsonpath='{.spec.template.spec.containers[0].image}'
  echo
  ```

  ### Step 4 — go forward again

  ```
  kubectl set image deploy/web nginx=nginx:1.27
  kubectl rollout status deploy/web
  ```

  When the image is `nginx:1.27` and the Deployment is ready,
  press `c`.

  Clean up later:
  ```
  kubectl delete deploy web
  ```
hint: "kubectl rollout history deploy/web --revision=2  -- see the change details of revision 2"
requires: [cluster]
check:
  type: multiple
  checks:
    - type: command
      cmd: "kubectl get deploy web -o jsonpath='{.spec.template.spec.containers[0].image}'"
      expect: "nginx:1.27"
    - type: command
      cmd: "kubectl get deploy web -o jsonpath='{.status.readyReplicas}'"
      expect: "2"
      timeout_seconds: 120
