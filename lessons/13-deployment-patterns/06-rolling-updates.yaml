id: 13-deployment-patterns/06-rolling-updates
title: "Rolling updates and rollbacks"
module: deployment-patterns
order: 6
estimated_minutes: 18
learning_goal: "Roll out a new image with `kubectl set image`, watch the status, and roll back to the previous revision."
prerequisites:
  - deployments
  - replicasets
  - probes
intro: |
  # Rolling update

  A **rolling update** is the default way a Deployment changes
  versions. Kubernetes replaces Pods **a few at a time**, not all
  at once — so the app stays up during the change.

  ## Two knobs

  - **maxUnavailable** — how many old Pods can be down at once.
  - **maxSurge** — how many extra Pods can exist above `replicas`
    during the roll.

  Both accept a number (`1`) or a percent (`25%`). Defaults: `25%`
  and `25%`.

  ## The YAML

  ```yaml
  spec:
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 0     # zero-downtime, slower
    ...
  ```

  `type: Recreate` kills everything first, then starts new Pods.
  Only for apps that cannot run two versions at once.

  ## Break the commands apart

  ```
  kubectl set image deploy/NAME CONTAINER=IMAGE
  ```
  - `set image` — change the container image.
  - `deploy/NAME` — the Deployment (short form).
  - `CONTAINER=IMAGE` — set container named `CONTAINER` to
    `IMAGE`. The container name comes from
    `spec.template.spec.containers[i].name`. When you use
    `kubectl create deployment`, the container name is the image
    name without the tag.

  ```
  kubectl rollout status deploy/NAME             # wait until done
  kubectl rollout history deploy/NAME            # list revisions
  kubectl rollout undo deploy/NAME               # go back one
  kubectl rollout undo deploy/NAME --to-revision=2
  ```
warm_up:
  - prompt: "What does a Deployment own that manages the Pods directly?"
    answer: "A ReplicaSet. The Deployment creates a new ReplicaSet per revision and scales old ones down."
    kind: recall
    concept: replicasets
  - prompt: "Which probe tells Kubernetes 'this Pod can receive traffic now'?"
    answer: "The readiness probe. During a rolling update, K8s waits for it to pass before moving to the next Pod."
    kind: recall
    concept: probes
  - prompt: "What field on a Deployment sets how many Pods it runs?"
    answer: "`spec.replicas`."
    kind: recall
    concept: deployments
task: |
  **Your goal:** do a full "update, then roll back" flow with
  clear proof at each step.

  Requirements:
  1. Create a Deployment named **`ver`** with **2 replicas**
     starting on image **`nginx:1.24`**.
  2. Wait until READY is `2/2`.
  3. Update the image to **`nginx:1.26`**. Wait for the rollout
     to finish. Confirm the current image is `nginx:1.26`.
  4. Update the image again to **`nginx:1.27`**. Wait for the
     rollout to finish. Confirm the current image is `nginx:1.27`.
  5. Look at the rollout history — you should see **3 revisions**.
  6. **Roll back** to the previous revision (should land on
     `nginx:1.26`). Wait for the rollout to finish. Confirm the
     current image is `nginx:1.26`.
  7. Press `c`.

  Clean up later: delete the Deployment.
hint: |
  - Create: `kubectl create deployment ver --image=nginx:1.24 --replicas=2`
  - The container name after `kubectl create` is `nginx` (the image name without a tag).
  - Update: `kubectl set image deploy/ver nginx=nginx:1.26`
  - Wait: `kubectl rollout status deploy/ver`
  - History: `kubectl rollout history deploy/ver`
  - Undo: `kubectl rollout undo deploy/ver`
  - Current image: `kubectl get deploy ver -o jsonpath='{.spec.template.spec.containers[0].image}'`
requires: [cluster]
troubleshooting:
  scenario: |
    A team ships a rolling update on a 4-replica Deployment with:
    ```yaml
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 0
        maxUnavailable: 100%
    ```
    During the roll, all 4 old Pods are killed at once and users
    see a big spike of 502 errors.
  question: "Why does the rolling update behave like a Recreate?"
  diagnosis: |
    `maxUnavailable: 100%` means "all Pods can be down at once."
    Combined with `maxSurge: 0` (no extras), Kubernetes has no
    choice but to kill every old Pod before new Pods are ready.

    Fix: use safe defaults, for example:
    ```yaml
    maxSurge: 1
    maxUnavailable: 0
    ```
    Now K8s starts a new Pod, waits for readiness, then kills one
    old Pod. Zero downtime.
  concept: rolling-updates
review_questions:
  - prompt: "Which strategy replaces Pods gradually while keeping the app up?"
    kind: multiple_choice
    options:
      - "Recreate"
      - "RollingUpdate"
      - "OnDelete"
      - "Immediate"
    answer: "RollingUpdate. It replaces a few Pods at a time and waits for readiness."
    concept: rolling-updates
  - prompt: "Rollout stuck at 3/5 replicas. New Pods stay `NotReady`. Where do you look first?"
    kind: debug
    answer: "Readiness probe: `kubectl describe pod POD` and `kubectl logs POD`. If the probe never passes, the rollout stalls by design."
    concept: probes
  - prompt: "You want to jump back two revisions of a Deployment. Which command?"
    kind: scenario
    answer: "`kubectl rollout undo deploy/NAME --to-revision=K` where K is the target revision from `kubectl rollout history deploy/NAME`."
    concept: rolling-updates
  - prompt: "True or false: rolling back a Deployment restarts every Pod at once."
    kind: recall
    answer: "False. Rollback is another rolling update, so it also respects `maxSurge` and `maxUnavailable`."
    concept: rolling-updates
common_mistakes:
  - mistake: "`maxUnavailable: 100%` — every Pod can die at once."
    fix: "Use `maxSurge: 1`, `maxUnavailable: 0` for zero-downtime rollouts."
  - mistake: "No readiness probe on the container."
    fix: "Add one. Without it, Kubernetes marks Pods ready too early and moves on before the app can serve."
  - mistake: "Assuming a rollback restores data too."
    fix: "Rollback only restores the Pod spec/image. Any database migration you ran forward must be reversed on its own."
summary: |
  Rolling updates replace Pods a few at a time. `maxSurge` and
  `maxUnavailable` control the pace, and readiness probes gate
  each step. `kubectl rollout status/history/undo` is your main
  toolbox. Combined with canary and blue-green, you now have all
  three deploy patterns.
spaced_hooks:
  - concept: rolling-updates
    when: next
  - concept: rolling-updates
    when: "2-3"
  - concept: rolling-updates
    when: capstone
cheat: |
  ### Rolling updates
  Default strategy on a Deployment. Knobs:
  ```yaml
  spec:
    strategy:
      type: RollingUpdate        # or "Recreate"
      rollingUpdate:
        maxSurge: 1              # or "25%"
        maxUnavailable: 0        # or "25%"
    revisionHistoryLimit: 10
  ```

  **Commands:**
  - `kubectl set image deploy/N CONT=IMG`  — trigger update.
  - `kubectl rollout status deploy/N`
  - `kubectl rollout history deploy/N`
  - `kubectl rollout undo deploy/N [--to-revision=K]`
  - `kubectl rollout pause deploy/N` / `kubectl rollout resume deploy/N`.

  Current image: `kubectl get deploy N -o jsonpath='{.spec.template.spec.containers[0].image}'`.
check:
  type: multiple
  checks:
    - type: command
      cmd: "kubectl get deploy ver -o jsonpath='{.status.readyReplicas}'"
      expect: "2"
      timeout_seconds: 120
    - type: command
      cmd: "kubectl get deploy ver -o jsonpath='{.spec.template.spec.containers[0].image}'"
      expect: "nginx:1.26"
