id: 04-running-apps/01-pods
title: "Your first Pod"
module: running-apps
order: 1
estimated_minutes: 10
intro: |
  # Pods

  A **Pod** is the smallest part of Kubernetes.
  A Pod runs one container. Sometimes a Pod runs more than one container.

  Containers in the same Pod:
  - have the same IP address (they share the network)
  - can read the same files (when you give them shared storage)
  - start together and stop together

  Most Pods in real life have only one container.
task: |
  Make a Pod with the name `hello`. The Pod must run the `nginx` image.

  Open another terminal. Type this command:

  ```
  kubectl run hello --image=nginx
  ```

  Wait a few seconds for the image to download.
  When the Pod is `Running`, come back here and type `check`.
hint: "Use this command: kubectl run hello --image=nginx"
check:
  type: command
  cmd: "kubectl get pod hello -o jsonpath='{.status.phase}'"
  expect: "Running"
  timeout_seconds: 30
