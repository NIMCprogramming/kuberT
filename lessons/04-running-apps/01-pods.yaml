id: 04-running-apps/01-pods
title: "Your first Pod"
module: running-apps
order: 1
estimated_minutes: 15
intro: |
  # Pods

  A **Pod** is the smallest unit you can run on Kubernetes.
  A Pod runs one container. Sometimes it runs more than one
  container (rare, and only when they must live and die together).

  Containers in the same Pod:
  - share the same IP address (they see each other on `localhost`)
  - can read the same files (when you give them a shared volume)
  - start together and stop together

  Most Pods in real life have only one container.

  ## Two ways to make a Pod

  **1. Imperative — one command:**
  ```
  kubectl run POD_NAME --image=IMAGE [--restart=Never] [--port=N] [--env=K=V]
  ```

  **2. Declarative — from YAML:**
  ```yaml
  apiVersion: v1
  kind: Pod
  metadata:
    name: POD_NAME
    labels: { app: web }
  spec:
    containers:
      - name: c
        image: IMAGE
        ports:
          - containerPort: 80
  ```
  Then: `kubectl apply -f my-pod.yaml`

  ## What can you do with a Pod?

  - **logs**: `kubectl logs <pod>`
  - **shell inside**: `kubectl exec -it <pod> -- sh`
  - **see internal IP**: `kubectl get pod <pod> -o wide`
  - **delete**: `kubectl delete pod <pod>`

task: |
  **Your goal:** build a Pod from YAML (not `kubectl run`),
  then inspect it.

  Requirements:
  1. Write and apply a Pod with these properties:
     - name: **`hello`**
     - one container using image **`nginx`**
     - the container's port **80** declared in `containerPort`
     - a label **`app: hello`**
  2. Wait until STATUS is `Running`.
  3. Read the logs.
  4. Confirm the Pod really has label `app=hello`:
     ```
     kubectl get pods -l app=hello
     ```

  Then press `c`.

  Clean up later: delete the Pod.
hint: |
  - Save the YAML to a file (e.g. `hello.yaml`) and run `kubectl apply -f hello.yaml`.
  - Or paste it inline with a heredoc:
    ```
    cat <<'EOF' | kubectl apply -f -
    apiVersion: v1
    kind: Pod
    ...
    EOF
    ```
  - Fields to fill: `metadata.name`, `metadata.labels`, `spec.containers[0].image`, `spec.containers[0].ports[0].containerPort`.
  - Verify labels: `kubectl get pod hello --show-labels`.
requires: [cluster]
check:
  type: multiple
  checks:
    - type: command
      cmd: "kubectl get pod hello -o jsonpath='{.status.phase}'"
      expect: "Running"
      timeout_seconds: 60
    - type: command
      cmd: "kubectl get pod hello -o jsonpath='{.metadata.labels.app}'"
      expect: "hello"
    - type: command
      cmd: "kubectl get pod hello -o jsonpath='{.spec.containers[0].ports[0].containerPort}'"
      expect: "80"
