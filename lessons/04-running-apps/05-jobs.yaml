id: 04-running-apps/05-jobs
title: "Jobs and CronJobs"
module: running-apps
order: 5
estimated_minutes: 15
learning_goal: "Run a one-shot Job, read its logs, and schedule a CronJob to run every minute."
prerequisites:
  - pods
  - deployments
  - kubectl-basics
intro: |
  # Jobs

  A **Job** runs a Pod that **does the work once and then stops**.
  Great for:
  - one-time database migrations
  - sending an email batch
  - a data import

  A Deployment says: *"keep this Pod running forever".*
  A Job says: *"run this Pod until it is done, then stop".*

  A **CronJob** is a Job on a schedule (like Linux `cron`).

  ## When is a Job "done"?

  A Job counts a Pod as done when the container exits with code
  `0`. If it exits non-zero, the Job retries (up to
  `backoffLimit` times, default 6).

  ## Example (reference)

  ```
  kubectl create job NAME --image=IMAGE -- COMMAND ARGS
  ```
  - `--` separates kubectl flags from the container command.

  ```
  kubectl create cronjob NAME --image=IMAGE --schedule="*/1 * * * *" -- COMMAND ARGS
  ```
  - `--schedule` uses standard cron syntax: `min hour day month weekday`.
task: |
  **Your goal:** run two Jobs and one CronJob.

  Requirements:
  1. Create a Job named **`sum`** using image **`busybox`** whose
     container command computes and prints **`1+2=3`**. You can do
     it with a shell one-liner.
  2. Wait for the Job to succeed (COMPLETIONS `1/1`).
  3. Read the Job's logs. It must contain the string `1+2=3`.
  4. Create a CronJob named **`beep`** using image **`busybox`**
     that runs `echo beep` **every minute** (`*/1 * * * *`).
  5. Confirm the CronJob exists (`kubectl get cronjob beep`).
  6. Press `c` (you do not need to wait a whole minute).

  Clean up later: delete the Job and the CronJob.
hint: |
  - Shell one-liner: use `sh -c "echo '1+2=3'"` as the container command. Format:
    `kubectl create job sum --image=busybox -- sh -c "echo '1+2=3'"`.
  - Read logs: `kubectl logs job/sum`.
  - CronJob: `kubectl create cronjob beep --image=busybox --schedule="*/1 * * * *" -- echo beep`.
requires: [cluster]
cheat: |
  ### Jobs and CronJobs
  - **Job** — runs Pods until they succeed once (exit 0), then stops.
  - **CronJob** — Job on a schedule (cron syntax).
  - `kubectl create job NAME --image=IMG -- CMD ARGS`
  - `kubectl create cronjob NAME --image=IMG --schedule="*/1 * * * *" -- CMD`
  - `kubectl logs job/NAME`  — read Pod logs via the Job.
  - `.status.succeeded` = how many completions so far.
  - Retry count: `.spec.backoffLimit` (default 6).
warm_up:
  - prompt: "What is a Deployment good for?"
    answer: "Long-running apps (web servers, APIs). Keeps a set of Pods alive."
    kind: recall
    concept: deployments
  - prompt: "What is the smallest unit Kubernetes runs?"
    answer: "A Pod."
    kind: recall
    concept: pods
  - prompt: "Which command shows the logs of a Pod?"
    answer: "`kubectl logs <pod>`."
    kind: recall
    concept: kubectl-basics
troubleshooting:
  scenario: |
    You created a Job with this YAML:
    ```yaml
    apiVersion: batch/v1
    kind: Job
    metadata: { name: migrate }
    spec:
      template:
        spec:
          containers:
            - name: c
              image: busybox
              command: ["sh", "-c", "false"]
    ```
    kubectl says:
    ```
    The Job "migrate" is invalid: spec.template.spec.restartPolicy:
    Required value: valid values: "OnFailure", "Never"
    ```
  question: "What is wrong and how do you fix it?"
  diagnosis: |
    Pods in a Job **must** have `restartPolicy: OnFailure` or
    `Never`. The default `Always` is only for long-running Pods
    (Deployments). A Job with `Always` would never end.

    Fix:
    ```yaml
    spec:
      template:
        spec:
          restartPolicy: OnFailure       # or: Never
          containers: [...]
    ```
    - `OnFailure` — restart the same Pod on non-zero exit.
    - `Never` — create a fresh Pod on non-zero exit (until `backoffLimit`).
  concept: jobs
review_questions:
  - prompt: "When does a Job count a Pod as successful?"
    kind: multiple_choice
    options:
      - "When the Pod is Running"
      - "When the container exits with code 0"
      - "When the Pod is Ready"
      - "After 60 seconds"
    answer: "When the container exits with code 0. Non-zero exit means fail; the Job retries up to `backoffLimit` times."
    concept: jobs
  - prompt: "What is a CronJob?"
    kind: recall
    answer: "A Job on a schedule, using cron syntax (`min hour day month weekday`). Kubernetes creates a Job on each tick."
    concept: jobs
  - prompt: "You need to run a database migration once, then stop. Which resource fits?"
    kind: scenario
    answer: "A Job. Deployments never stop; a Job runs to completion and then stops."
    concept: jobs
  - prompt: "You want your report to run every hour on the hour. What is the cron schedule?"
    kind: recall
    answer: "`0 * * * *` (minute 0 of every hour)."
    concept: jobs
  - prompt: "Your Job Pod exits non-zero 6 times and then stops retrying. Why?"
    kind: debug
    answer: "The default `backoffLimit` is 6. After that many failures the Job is marked Failed. Fix the bug or raise `backoffLimit`."
    concept: jobs
common_mistakes:
  - mistake: "Leaving `restartPolicy` unset (defaults to `Always`)."
    fix: "Set `restartPolicy: OnFailure` or `Never` in Job Pod templates."
  - mistake: "Reading logs with `kubectl logs <job-name>`; kubectl says 'not found'."
    fix: "Use `kubectl logs job/<name>` or find the Pod: `kubectl get pods -l job-name=<name>` then `kubectl logs <pod>`."
  - mistake: "Using a Deployment for a one-off task."
    fix: "Use a Job. Deployment Pods never finish; they restart forever."
summary: |
  Use a Job for one-off work (migrations, batch tasks) and a
  CronJob when the work should repeat on a schedule. Remember to
  set `restartPolicy: OnFailure` or `Never`, and use
  `kubectl logs job/<name>` to read output.
spaced_hooks:
  - concept: jobs
    when: "5-7"
  - concept: jobs
    when: capstone
  - concept: deployments
    when: next
check:
  type: multiple
  checks:
    - type: command
      cmd: "kubectl get job sum -o jsonpath='{.status.succeeded}'"
      expect: "1"
      timeout_seconds: 60
    - type: command
      cmd: "kubectl logs job/sum"
      expect: "1+2=3"
    - type: command
      cmd: "kubectl get cronjob beep -o jsonpath='{.spec.schedule}'"
      expect: "*/1 * * * *"
