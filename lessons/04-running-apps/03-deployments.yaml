id: 04-running-apps/03-deployments
title: "Deployments"
module: running-apps
order: 3
estimated_minutes: 20
learning_goal: "Create a Deployment, scale it, roll it forward, and roll it back."
prerequisites:
  - pods
  - replicasets
  - labels
  - kubectl-basics
intro: |
  # Deployments

  A **Deployment** is the tool you use most of the time to run
  apps on Kubernetes. Chain: **Deployment → ReplicaSet → Pods**.

  A Deployment:
  - keeps the wanted number of Pods alive
  - lets you **update** the image safely, one Pod at a time
  - lets you **roll back** to the old version if the new one
    breaks

  ## Two ways to create a Deployment

  **Imperative:**
  ```
  kubectl create deployment NAME --image=IMAGE --replicas=N
  ```
  (This adds label `app=NAME` to Pods automatically.)

  **Declarative** (a fuller YAML you can save in git):
  ```yaml
  apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: NAME
  spec:
    replicas: N
    selector:
      matchLabels: { app: NAME }
    template:
      metadata:
        labels: { app: NAME }
      spec:
        containers:
          - name: c
            image: IMAGE
  ```

  ## Common follow-up commands

  ```
  kubectl set image deploy/NAME c=NEW_IMAGE       # trigger rolling update
  kubectl rollout status deploy/NAME              # wait for finish
  kubectl rollout history deploy/NAME             # list revisions
  kubectl rollout undo deploy/NAME                # go back
  kubectl scale deploy/NAME --replicas=M          # change count
  ```

  Note `deploy/NAME` = short form of `deployment/NAME`.

task: |
  **Your goal:** create, scale, update, and roll back.

  Requirements:
  1. Create a Deployment named **`api`** with image
     **`nginx:1.25`** and **2 replicas**.
  2. Wait until READY is `2/2`.
  3. **Scale it up** to **5 replicas**.
  4. Wait until READY is `5/5`.
  5. **Update the image** to **`nginx:1.27`**. Wait for the
     rollout to finish.
  6. **Roll back** to the previous version. Wait for the rollout
     to finish. The current image should be `nginx:1.25` again.
  7. Press `c`.

  Clean up later: delete the Deployment.
hint: |
  - Create: `kubectl create deployment ... --image=... --replicas=...`
  - Scale: `kubectl scale deploy/api --replicas=5`
  - Update image: `kubectl set image deploy/api CONTAINER=IMAGE` — the container is named `nginx` if you used `kubectl create` (kubectl uses the image name without tag as the container name).
  - Wait: `kubectl rollout status deploy/api`
  - Roll back: `kubectl rollout undo deploy/api`
  - Check current image: `kubectl get deploy api -o jsonpath='{.spec.template.spec.containers[0].image}'`.
requires: [cluster]
cheat: |
  ### Deployments
  Chain: **Deployment → ReplicaSet → Pods**.

  - `kubectl create deployment NAME --image=IMG --replicas=N`
  - `kubectl scale deploy/NAME --replicas=M`
  - `kubectl set image deploy/NAME CONTAINER=NEW_IMAGE`  — rolling update.
  - `kubectl rollout status deploy/NAME`  — wait until done.
  - `kubectl rollout history deploy/NAME`  — list revisions.
  - `kubectl rollout undo deploy/NAME [--to-revision=N]`  — roll back.
  - `kubectl delete deploy NAME`  — remove.
  - Container name after `kubectl create deployment IMG`: it is `IMG` (image without tag).
warm_up:
  - prompt: "What does a ReplicaSet keep constant?"
    answer: "A fixed number of Pods that match its selector labels."
    kind: recall
    concept: replicasets
  - prompt: "What is a Pod?"
    answer: "The smallest unit in Kubernetes; wraps one or more containers that share an IP."
    kind: recall
    concept: pods
  - prompt: "Why do template labels need to match selector labels?"
    answer: "Otherwise the controller (ReplicaSet, Deployment) creates Pods it cannot own, and loops forever."
    kind: recall
    concept: labels
troubleshooting:
  scenario: |
    You wrote this YAML for a Deployment and applied it:
    ```yaml
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: api
    spec:
      replicas: 3
      template:
        metadata:
          labels: { app: api }
        spec:
          containers:
            - name: c
              image: nginx
    ```
    kubectl says:
    ```
    error: error validating data: ValidationError(Deployment.spec):
    missing required field "selector"
    ```
  question: "What did you forget, and how do you fix it?"
  diagnosis: |
    Deployment requires `spec.selector.matchLabels`. Unlike
    `kubectl create deployment` (which fills it in for you), a
    hand-written YAML must include the selector.

    Fix:
    ```yaml
    spec:
      replicas: 3
      selector:
        matchLabels: { app: api }
      template:
        metadata:
          labels: { app: api }
        spec: ...
    ```
    The selector keys must be present in the template labels.
  concept: deployments
review_questions:
  - prompt: "Chain from a Deployment to Pods is:"
    kind: multiple_choice
    options:
      - "Deployment -> Pod -> ReplicaSet"
      - "ReplicaSet -> Deployment -> Pod"
      - "Deployment -> ReplicaSet -> Pod"
      - "Pod -> Deployment -> ReplicaSet"
    answer: "Deployment -> ReplicaSet -> Pod. Deployment owns a ReplicaSet, which owns Pods."
    concept: deployments
  - prompt: "You updated the image with `kubectl set image` but a new Pod immediately crashes. Which command reverts to the last working version?"
    kind: scenario
    answer: "`kubectl rollout undo deploy/<name>`. It brings back the previous ReplicaSet."
    concept: deployments
  - prompt: "How do you scale a Deployment named `api` up to 10 replicas without editing YAML?"
    kind: recall
    answer: "`kubectl scale deploy/api --replicas=10`."
    concept: deployments
  - prompt: "You edit a ReplicaSet owned by a Deployment and change its image. What happens?"
    kind: debug
    answer: "The Deployment reverts your change soon because it is the source of truth. Change the Deployment, not the ReplicaSet."
    concept: replicasets
  - prompt: "Which command waits until a rollout is finished?"
    kind: recall
    answer: "`kubectl rollout status deploy/<name>`."
    concept: deployments
common_mistakes:
  - mistake: "Forgetting `spec.selector.matchLabels` in hand-written Deployment YAML."
    fix: "Always add it, and make sure the same labels are in `template.metadata.labels`."
  - mistake: "Editing the ReplicaSet to change the image."
    fix: "Edit the Deployment (or use `kubectl set image deploy/NAME c=IMG`). The Deployment owns the ReplicaSet."
  - mistake: "Setting `replicas` in YAML AND using an HPA later, without care."
    fix: "The HPA controls replicas. If your YAML also sets it, remove `replicas` (or expect fights). More in module 12."
summary: |
  A Deployment is the everyday way to run apps. It owns a
  ReplicaSet, which owns Pods. You scale, roll forward, and roll
  back with `kubectl scale`, `kubectl set image`, and
  `kubectl rollout undo`. Almost every later lesson uses a
  Deployment.
