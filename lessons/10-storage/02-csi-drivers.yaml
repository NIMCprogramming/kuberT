id: 10-storage/02-csi-drivers
title: "CSI drivers and StorageClasses"
module: storage
order: 2
estimated_minutes: 12
intro: |
  # How does the real disk get created?

  When you make a PVC, something must create the real disk on the
  cloud (or on the local disk of the node). That "something" is a
  **CSI driver**.

  **CSI** = *Container Storage Interface*. It is a common API so
  every storage system (AWS EBS, GCP PD, Ceph, NFS, local disks,
  ...) can plug into Kubernetes the same way.

  A **StorageClass** is the "menu item" the user picks:
  - `name` — like `fast-ssd`, `slow-hdd`, `standard`.
  - `provisioner` — which CSI driver to use.
  - `parameters` — size limits, replication, disk type, encryption.
  - `reclaimPolicy` — what happens to the disk when the PVC is
    deleted (`Delete` or `Retain`).

  If you do not name a StorageClass in your PVC, the cluster's
  **default** StorageClass is used. On `kind`, the default is
  `standard` (a local disk on the node, provisioned by the
  `rancher.io/local-path` driver).

  ## Break the fields apart

  Look at one:
  ```
  kubectl get storageclass standard -o yaml
  ```

  Key parts:
  ```yaml
  apiVersion: storage.k8s.io/v1
  kind: StorageClass
  metadata:
    name: standard
    annotations:
      storageclass.kubernetes.io/is-default-class: "true"  # <-- default
  provisioner: rancher.io/local-path       # the CSI driver
  reclaimPolicy: Delete                     # PV deleted with PVC
  volumeBindingMode: WaitForFirstConsumer   # wait for a Pod, then create
  ```

  `WaitForFirstConsumer` is important: the PV is only made when a
  Pod actually uses the PVC. This is common for local-disk drivers,
  because the disk must be on the same node where the Pod runs.

  ## How to pick a StorageClass in a PVC

  Add one line under `spec:` in the PVC YAML:
  ```yaml
  spec:
    storageClassName: standard
    ...
  ```

  Or `storageClassName: ""` to say *"no dynamic provisioning; only
  match an existing PV"*.

task: |
  ### Step 1 — list the StorageClasses

  ```
  kubectl get storageclass
  ```

  You should see one marked `(default)`.

  ### Step 2 — look at the default in detail

  ```
  kubectl get storageclass standard -o yaml
  ```

  Notice:
  - `provisioner:` — the CSI driver name.
  - `reclaimPolicy:` — usually `Delete` on `kind`.
  - `volumeBindingMode:` — usually `WaitForFirstConsumer`.

  ### Step 3 — check

  When you can see one default class, press `c`.
hint: "kubectl describe storageclass standard  -- same info, nicer to read"
requires: [cluster]
cheat: |
  ### StorageClasses & CSI
  - **CSI** = Container Storage Interface. Standard plugin API.
  - A **StorageClass** picks a CSI driver + parameters.

  Key fields in a StorageClass:
  - `provisioner`         — the CSI driver name.
  - `parameters`          — driver-specific (disk type, replication, ...).
  - `reclaimPolicy`       — `Delete` (destroy PV) or `Retain` (keep PV).
  - `volumeBindingMode`   — `Immediate` or `WaitForFirstConsumer` (wait for a Pod).

  **Commands:**
  - `kubectl get storageclass`
  - `kubectl get sc <name> -o yaml`
  - Set a default class: annotation `storageclass.kubernetes.io/is-default-class: "true"`.

  In a PVC pick a class with `spec.storageClassName: NAME`. Use `""` (empty) to match only pre-existing PVs (no dynamic provisioning).
check:
  type: command
  cmd: "kubectl get storageclass -o jsonpath='{.items[?(@.metadata.annotations.storageclass\\.kubernetes\\.io/is-default-class==\"true\")].metadata.name}'"
  expect: "standard"
  timeout_seconds: 15
