id: 10-storage/02-csi-drivers
title: "CSI drivers and StorageClasses"
module: storage
order: 2
estimated_minutes: 12
learning_goal: "Read a StorageClass and pick the right one for a PVC."
prerequisites:
  - volumes-pv-pvc
  - yaml-apply
  - kubectl
intro: |
  # How does the real disk get created?

  When you make a PVC, something must create the real disk on the
  cloud (or on the local disk of the node). That "something" is a
  **CSI driver**.

  **CSI** = *Container Storage Interface*. It is a common API so
  every storage system (AWS EBS, GCP PD, Ceph, NFS, local disks,
  ...) can plug into Kubernetes the same way.

  A **StorageClass** is the "menu item" the user picks:
  - `name` — like `fast-ssd`, `slow-hdd`, `standard`.
  - `provisioner` — which CSI driver to use.
  - `parameters` — size limits, replication, disk type, encryption.
  - `reclaimPolicy` — what happens to the disk when the PVC is
    deleted (`Delete` or `Retain`).

  If you do not name a StorageClass in your PVC, the cluster's
  **default** StorageClass is used. On `kind`, the default is
  `standard` (a local disk on the node, provisioned by the
  `rancher.io/local-path` driver).

  ## Break the fields apart

  Look at one:
  ```
  kubectl get storageclass standard -o yaml
  ```

  Key parts:
  ```yaml
  apiVersion: storage.k8s.io/v1
  kind: StorageClass
  metadata:
    name: standard
    annotations:
      storageclass.kubernetes.io/is-default-class: "true"  # <-- default
  provisioner: rancher.io/local-path       # the CSI driver
  reclaimPolicy: Delete                     # PV deleted with PVC
  volumeBindingMode: WaitForFirstConsumer   # wait for a Pod, then create
  ```

  `WaitForFirstConsumer` is important: the PV is only made when a
  Pod actually uses the PVC. This is common for local-disk drivers,
  because the disk must be on the same node where the Pod runs.

  ## How to pick a StorageClass in a PVC

  Add one line under `spec:` in the PVC YAML:
  ```yaml
  spec:
    storageClassName: standard
    ...
  ```

  Or `storageClassName: ""` to say *"no dynamic provisioning; only
  match an existing PV"*.

warm_up:
  - prompt: "What is a PVC, in one sentence?"
    answer: "A user's request for storage of a given size and access mode; Kubernetes finds or creates a PV to satisfy it."
    kind: recall
    concept: volumes-pv-pvc
  - prompt: "Which three access modes can a PVC ask for?"
    answer: "`ReadWriteOnce` (RWO), `ReadOnlyMany` (ROX), `ReadWriteMany` (RWX)."
    kind: recall
    concept: volumes-pv-pvc
  - prompt: "How do you list all resources of a kind (like PVCs) in the current namespace?"
    answer: "`kubectl get pvc` (short) or `kubectl get persistentvolumeclaims`."
    kind: recall
    concept: kubectl
task: |
  ### Step 1 — list the StorageClasses

  ```
  kubectl get storageclass
  ```

  You should see one marked `(default)`.

  ### Step 2 — look at the default in detail

  ```
  kubectl get storageclass standard -o yaml
  ```

  Notice:
  - `provisioner:` — the CSI driver name.
  - `reclaimPolicy:` — usually `Delete` on `kind`.
  - `volumeBindingMode:` — usually `WaitForFirstConsumer`.

  ### Step 3 — check

  When you can see one default class, press `c`.
hint: "kubectl describe storageclass standard  -- same info, nicer to read"
requires: [cluster]
troubleshooting:
  scenario: |
    A user creates this PVC on a cluster with two StorageClasses,
    `fast-ssd` (RWO) and `nfs-shared` (RWX):
    ```yaml
    apiVersion: v1
    kind: PersistentVolumeClaim
    metadata: { name: shared }
    spec:
      accessModes: [ReadWriteMany]
      resources: { requests: { storage: 1Gi } }
      storageClassName: fast-ssd
    ```
    The PVC stays in `Pending` forever.
  question: "What mistake did the user make?"
  diagnosis: |
    They picked the wrong StorageClass for the access mode.
    `fast-ssd` only supports `ReadWriteOnce`, but the PVC asks for
    `ReadWriteMany`. No PV can satisfy this.

    Fix: either
    - Change `storageClassName: nfs-shared` (which supports RWX).
    - Or change the access mode to `ReadWriteOnce` if only one Pod
      will write.

    Rule: always match the access mode to what the StorageClass
    can offer.
  concept: csi-drivers
review_questions:
  - prompt: "What does CSI stand for and why does it exist?"
    kind: multiple_choice
    options:
      - "Container Storage Interface — a shared API so any storage system can plug into Kubernetes the same way"
      - "Cluster Storage Instance — the actual disk"
      - "Common Storage Index — a list of PVCs"
      - "Compact Storage Image — a small disk image"
    answer: "Container Storage Interface. It is the shared plugin API used by cloud disks, NFS, Ceph, local disks, and more."
    concept: csi-drivers
  - prompt: "What is `volumeBindingMode: WaitForFirstConsumer` used for?"
    kind: recall
    answer: "The PV is only created when a Pod tries to use the PVC. That way the disk lands on the same node as the Pod. Common for local-disk drivers."
    concept: csi-drivers
  - prompt: "Your cluster has three StorageClasses. A PVC does not name one. Which one is used?"
    kind: scenario
    answer: "The one marked as **default** by the annotation `storageclass.kubernetes.io/is-default-class: \"true\"`. If none is default, the PVC stays Pending."
    concept: csi-drivers
  - prompt: "What is the difference between `reclaimPolicy: Delete` and `Retain`?"
    kind: recall
    answer: "`Delete`: when the PVC is deleted, the PV and the real disk are also deleted. `Retain`: the PV stays (with data) so an admin can recover it."
    concept: csi-drivers
common_mistakes:
  - mistake: "Picking a StorageClass whose access mode does not match the PVC (RWO class, RWX claim)."
    fix: "Read what the StorageClass supports before you set the PVC's access mode."
  - mistake: "Using `reclaimPolicy: Delete` for production data."
    fix: "For important data, use `Retain` so a mistake does not destroy the disk. Set backups too."
summary: |
  A CSI driver creates the real disk. A StorageClass names the
  driver plus parameters and picks a reclaim policy and binding
  mode. Match the StorageClass to the access mode your PVC needs.
  You will use StorageClasses again with StatefulSets.
spaced_hooks:
  - concept: csi-drivers
    when: next
  - concept: csi-drivers
    when: capstone
cheat: |
  ### StorageClasses & CSI
  - **CSI** = Container Storage Interface. Standard plugin API.
  - A **StorageClass** picks a CSI driver + parameters.

  Key fields in a StorageClass:
  - `provisioner`         — the CSI driver name.
  - `parameters`          — driver-specific (disk type, replication, ...).
  - `reclaimPolicy`       — `Delete` (destroy PV) or `Retain` (keep PV).
  - `volumeBindingMode`   — `Immediate` or `WaitForFirstConsumer` (wait for a Pod).

  **Commands:**
  - `kubectl get storageclass`
  - `kubectl get sc <name> -o yaml`
  - Set a default class: annotation `storageclass.kubernetes.io/is-default-class: "true"`.

  In a PVC pick a class with `spec.storageClassName: NAME`. Use `""` (empty) to match only pre-existing PVs (no dynamic provisioning).
check:
  type: command
  cmd: "kubectl get storageclass -o jsonpath='{.items[?(@.metadata.annotations.storageclass\\.kubernetes\\.io/is-default-class==\"true\")].metadata.name}'"
  expect: "standard"
  timeout_seconds: 15
