id: 10-storage/03-stateful-apps
title: "Running stateful apps"
module: storage
order: 3
estimated_minutes: 15
intro: |
  # Stateful apps

  Databases and other apps that keep data need:
  1. **Stable Pod names** — so clients know where to reconnect.
  2. **Their own disk** — one PVC per Pod, not shared.
  3. **Ordered start-up** — Pod `-0` first, then `-1`, then `-2`.

  A **StatefulSet** (module 04) gives you 1 and 3. To get 2, you
  add a **`volumeClaimTemplates`** — a *template* for PVCs.
  Kubernetes creates **one PVC per Pod** from this template.

  Naming rule: for a StatefulSet named `data-app`, a PVC named
  `data` in the template becomes:
  - `data-data-app-0`
  - `data-data-app-1`
  - ...

  So `PVC_NAME = <template-name>-<statefulset-name>-<index>`.

  If a Pod restarts, it re-attaches to the **same** PVC — so the
  data is safe.

  ## Break the YAML apart

  ```yaml
  spec:
    serviceName: data-app             # headless Service name
    replicas: 2
    selector:
      matchLabels: { app: data-app }
    template:                          # POD recipe (same as Deployment)
      ...
    volumeClaimTemplates:              # extra piece for StatefulSets
      - metadata:
          name: data                   # PVC name prefix
        spec:
          accessModes: [ReadWriteOnce]
          resources:
            requests: { storage: 100Mi }
  ```

  This is how Postgres, MySQL, Kafka, and Elasticsearch run on
  Kubernetes.

task: |
  You will do three steps.

  ### Step 1 — create the StatefulSet

  ```
  cat <<'EOF' | kubectl apply -f -
  apiVersion: apps/v1
  kind: StatefulSet
  metadata:
    name: data-app
  spec:
    serviceName: data-app
    replicas: 2
    selector:
      matchLabels: { app: data-app }
    template:
      metadata:
        labels: { app: data-app }
      spec:
        containers:
          - name: c
            image: nginx
            volumeMounts:
              - name: data
                mountPath: /usr/share/nginx/html
    volumeClaimTemplates:
      - metadata:
          name: data
        spec:
          accessModes: [ReadWriteOnce]
          resources:
            requests: { storage: 100Mi }
  EOF
  ```

  ### Step 2 — see one PVC per Pod

  ```
  kubectl get pods -l app=data-app
  kubectl get pvc
  ```

  You should see:
  - Pods: `data-app-0`, `data-app-1`
  - PVCs: `data-data-app-0`, `data-data-app-1`

  ### Step 3 — write into one Pod's disk and prove it survives

  Put a file in `data-app-0`'s volume:
  ```
  kubectl exec data-app-0 -- sh -c "echo pod-0-data > /usr/share/nginx/html/index.html"
  kubectl exec data-app-0 -- cat /usr/share/nginx/html/index.html
  ```

  Delete `data-app-0`. The StatefulSet makes it again with the
  **same** name and re-attaches the **same** PVC:
  ```
  kubectl delete pod data-app-0
  kubectl wait --for=condition=Ready pod/data-app-0 --timeout=120s
  kubectl exec data-app-0 -- cat /usr/share/nginx/html/index.html
  ```

  You should still see `pod-0-data`. Then press `c`.

  Clean up later:
  ```
  kubectl delete statefulset data-app
  kubectl delete pvc -l app=data-app
  ```
hint: "kubectl get pod data-app-0 -o jsonpath='{.spec.volumes[0].persistentVolumeClaim.claimName}' -- see the PVC name attached"
requires: [cluster]
check:
  type: command
  cmd: "kubectl get statefulset data-app -o jsonpath='{.status.readyReplicas}'"
  expect: "2"
  timeout_seconds: 180
