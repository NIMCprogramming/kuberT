id: 10-storage/01-volumes-basics
title: "Volumes basics"
module: storage
order: 1
estimated_minutes: 18
learning_goal: "Create a PVC, bind it to a Pod, and prove data survives a Pod deletion."
prerequisites:
  - pods
  - yaml-apply
  - containers
intro: |
  # Why volumes?

  When a container stops, everything in its writable layer is
  **gone**. If your app writes files, you lose them.

  A **Volume** is a folder outside the container's writable
  layer. Containers in the same Pod can share it.

  Common Volume types:
  - **emptyDir** — created when the Pod starts, deleted when the
    Pod dies. Temp files.
  - **PersistentVolumeClaim (PVC)** — a request for real storage
    that survives Pod deletion. **This is the important one.**

  ## PV vs PVC

  - **PersistentVolume (PV)** — a piece of storage in the cluster.
    Either an admin made it, or the cluster made it from a
    StorageClass.
  - **PersistentVolumeClaim (PVC)** — the user's *request*: *"give
    me 1Gi of ReadWriteOnce storage"*.

  When you create a PVC, Kubernetes finds (or creates) a matching
  PV and **binds** them.

  ## PVC YAML shape

  ```yaml
  apiVersion: v1
  kind: PersistentVolumeClaim
  metadata:
    name: NAME
  spec:
    accessModes: [ReadWriteOnce]
    resources:
      requests:
        storage: 100Mi
    # storageClassName: standard   # optional (else default)
  ```

  ## Access modes

  - `ReadWriteOnce` (RWO) — one node mounts as read+write.
  - `ReadOnlyMany` (ROX) — many nodes, read-only.
  - `ReadWriteMany` (RWX) — many nodes, read+write (NFS-like).

  ## Wiring a PVC into a Pod

  ```yaml
  spec:
    containers:
      - name: c
        image: IMAGE
        volumeMounts:
          - name: v
            mountPath: /data
    volumes:
      - name: v
        persistentVolumeClaim:
          claimName: PVC_NAME
  ```

warm_up:
  - prompt: "What is a Pod, in one sentence?"
    answer: "The smallest unit in Kubernetes; one (or more) containers that share IP and volumes."
    kind: recall
    concept: pods
  - prompt: "What does `kubectl apply -f my.yaml` do?"
    answer: "It sends the YAML to Kubernetes. New resources are created; existing ones are updated to match the file."
    kind: recall
    concept: yaml-apply
  - prompt: "If a container writes to its own filesystem and then dies, what happens to those files?"
    answer: "They are lost. The writable layer of a container is thrown away when the container stops."
    kind: recall
    concept: containers
task: |
  **Your goal:** prove that a PVC keeps data across Pod restarts.

  Requirements:
  1. Create a PVC named **`work`** requesting **`200Mi`** with
     access mode **`ReadWriteOnce`**.
  2. Wait until STATUS is `Bound`.
  3. Create a Pod named **`writer`** using image **`busybox`**:
     - mount PVC `work` at path `/data`
     - container command: write `saved-by-writer` into
       `/data/note.txt`, then sleep forever
     - `restartPolicy: Never`
  4. Confirm the file exists inside: `kubectl exec writer -- cat /data/note.txt` should print `saved-by-writer`.
  5. **Delete** the `writer` Pod (but not the PVC).
  6. Create a **new** Pod named **`reader`** using image
     **`busybox`**:
     - mount the SAME PVC at `/data`
     - container command: `cat /data/note.txt`, then sleep
     - `restartPolicy: Never`
  7. Read the reader's logs. They must contain `saved-by-writer`.
  8. Press `c`.

  Clean up later: delete both Pods and the PVC.
hint: |
  - Container command for the writer:
    `["sh", "-c", "echo saved-by-writer > /data/note.txt; sleep 3600"]`
  - Container command for the reader:
    `["sh", "-c", "cat /data/note.txt; sleep 3600"]`
  - Use `<<'EOF'` for the heredoc.
  - Check bind status: `kubectl get pvc work` → STATUS Bound.
  - See the auto-created PV: `kubectl get pvc work -o jsonpath='{.spec.volumeName}'`.
requires: [cluster]
troubleshooting:
  scenario: |
    You created this PVC:
    ```yaml
    apiVersion: v1
    kind: PersistentVolumeClaim
    metadata: { name: work }
    spec:
      accessModes: [ReadWriteMany]
      resources: { requests: { storage: 1Gi } }
    ```
    On `kind`, `kubectl get pvc work` shows STATUS `Pending` forever.
    `kubectl describe pvc work` says:
    ```
    no persistent volumes available for this claim and no storage class is set
    ```
  question: "Why does the PVC never bind, and how do you fix it?"
  diagnosis: |
    The default StorageClass on `kind` is `local-path`. It only
    supports **`ReadWriteOnce`**, not `ReadWriteMany`. No PV can
    satisfy your claim, so the PVC stays Pending.

    Two fixes:
    1. Change the PVC to `accessModes: [ReadWriteOnce]`.
    2. Install a driver that supports RWX (like an NFS provisioner)
       and set its StorageClass on the PVC.

    Always match the PVC's `accessModes` to what the StorageClass
    actually supports.
  concept: volumes-pv-pvc
review_questions:
  - prompt: "Which access mode lets ONE node mount the volume as read+write?"
    kind: multiple_choice
    options:
      - "ReadOnlyMany"
      - "ReadWriteMany"
      - "ReadWriteOnce"
      - "ReadOnlyOnce"
    answer: "`ReadWriteOnce` (RWO). It is the most common mode."
    concept: volumes-pv-pvc
  - prompt: "You deleted a Pod that used PVC `work`. What happens to the data on the PVC?"
    kind: recall
    answer: "The PVC (and the PV behind it) stays. The next Pod that mounts the same PVC sees the old data."
    concept: volumes-pv-pvc
  - prompt: "You want a shared config folder that dies with the Pod. Which Volume type?"
    kind: scenario
    answer: "`emptyDir`. It is created when the Pod starts and deleted when the Pod dies."
    concept: volumes-pv-pvc
  - prompt: "Your PVC is stuck in `Pending`. What is the first thing to check?"
    kind: debug
    answer: "`kubectl describe pvc NAME` — the events at the bottom say why. Common reasons: no matching StorageClass, wrong `accessModes`, or `WaitForFirstConsumer` with no Pod using the PVC yet."
    concept: volumes-pv-pvc
common_mistakes:
  - mistake: "Asking for `ReadWriteMany` on a driver that only supports `ReadWriteOnce`."
    fix: "Check what your StorageClass supports first. On `kind`, use RWO."
  - mistake: "Deleting the PVC when you only meant to delete the Pod."
    fix: "Delete the Pod, not the PVC. The PVC (and data) stays."
  - mistake: "Expecting `emptyDir` to keep data across Pod restarts."
    fix: "`emptyDir` dies with the Pod. Use a PVC for data that must survive."
summary: |
  A Volume is storage that lives outside a container's writable
  layer. A PVC is your request for real storage; Kubernetes finds
  or creates a PV to satisfy it. Data on a PVC survives Pod
  deletion. You will use PVCs again with StatefulSets and CSI
  drivers.
spaced_hooks:
  - concept: volumes-pv-pvc
    when: next
  - concept: volumes-pv-pvc
    when: "2-3"
  - concept: volumes-pv-pvc
    when: capstone
cheat: |
  ### Volumes and PVCs
  - **Volume** = folder outside the container's writable layer.
  - Types: `emptyDir` (temp), `hostPath` (rare), `persistentVolumeClaim` (real disk).

  **Access modes:** `ReadWriteOnce` (RWO), `ReadOnlyMany` (ROX), `ReadWriteMany` (RWX).

  **PVC YAML:**
  ```yaml
  apiVersion: v1
  kind: PersistentVolumeClaim
  metadata: { name: NAME }
  spec:
    accessModes: [ReadWriteOnce]
    resources: { requests: { storage: 1Gi } }
    # storageClassName: standard
  ```

  **Use it in a Pod:**
  ```yaml
  spec:
    containers:
      - { name: c, image: IMG, volumeMounts: [{ name: v, mountPath: /data }] }
    volumes:
      - { name: v, persistentVolumeClaim: { claimName: NAME } }
  ```

  Check bind: `kubectl get pvc NAME` → STATUS Bound.
check:
  type: multiple
  checks:
    - type: command
      cmd: "kubectl get pvc work -o jsonpath='{.status.phase}'"
      expect: "Bound"
      timeout_seconds: 60
    - type: command
      cmd: "kubectl logs reader"
      expect: "saved-by-writer"
      timeout_seconds: 60
