id: 02-containers/03-docker-for-k8s
title: "Docker and Kubernetes"
module: containers
order: 3
estimated_minutes: 8
intro: |
  # Docker and Kubernetes

  **Docker** is the most famous tool for building and running
  containers. When you make an image with `docker build`, other
  tools can use that same image — including Kubernetes.

  Kubernetes does **not** need Docker to run. It uses something
  called a **container runtime**. Popular runtimes:
  - **containerd** (the one under the hood in most clusters today)
  - **CRI-O**

  But you can still use Docker to *build* the image. The image
  format is the same. Kubernetes just picks it up and runs it.

  In this project, `kind` uses **containerd** inside its node
  container. You do not need Docker to make images for these
  lessons — we will use images that are already on Docker Hub,
  like `nginx`.

  **The short version:**
  - Build images with Docker (or with `podman`, `buildah`, ...).
  - Push images to a registry (like Docker Hub).
  - Kubernetes pulls the image and runs it.
task: |
  Check that Docker works on your machine.

  In another terminal, type:

  ```
  docker version
  ```

  You should see a version number for **Client** and **Server**.
  If you see an error like *"Cannot connect to the Docker daemon"*,
  Docker is not running. Start it, then try again.

  When it works, come back and press `c`.
hint: "If the command hangs, run: sudo systemctl start docker"
check:
  type: command
  cmd: "docker version --format '{{.Server.Version}}'"
  expect: "."
  timeout_seconds: 10
