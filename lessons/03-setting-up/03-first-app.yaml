id: 03-setting-up/03-first-app
title: "Your first app on the cluster"
module: setting-up
order: 3
estimated_minutes: 12
intro: |
  # Your first app

  Time to run something on your cluster. The simplest app is
  **nginx** — a small web server.

  Real projects use **Deployments** (later lesson), but a plain
  Pod is enough for a first try.

  ## Example (reference)

  ```
  kubectl run POD_NAME --image=IMAGE [--restart=Never] [--env=K=V]
  kubectl get pod POD_NAME
  kubectl logs POD_NAME
  kubectl exec -it POD_NAME -- sh
  kubectl delete pod POD_NAME
  ```
task: |
  **Your goal:** run your first Pod, look inside it, and clean up.

  Requirements:
  1. Create a Pod named **`hello-web`** using image **`nginx`**.
  2. Wait until STATUS is `Running`.
  3. Read the nginx start-up **logs**.
  4. Open a **shell inside** the container and run `hostname` and
     `ls /usr/share/nginx/html`. Then leave the shell (`exit`).
  5. Confirm STATUS is still `Running`, then press `c`.

  When done with the lesson, delete the Pod.
hint: |
  - Create: `kubectl run <name> --image=<image>` (default is a Deployment-less Pod).
  - Wait: `kubectl get pod <name> -w` (Ctrl+C to stop).
  - Logs: `kubectl logs <name>`.
  - Shell: `kubectl exec -it <name> -- sh`  (the `--` separates kubectl flags from the command).
  - Delete: `kubectl delete pod <name>`.
requires: [cluster]
cheat: |
  ### Running a Pod fast
  - `kubectl run NAME --image=IMAGE`  — one-off Pod.
  - `kubectl run NAME --image=IMAGE --restart=Never`  — plain Pod (no Deployment shell around it).
  - `kubectl run NAME --image=IMAGE --rm -it -- CMD`  — run once, delete on exit.
  - `kubectl get pod NAME -o wide`  — IP + node.
  - `kubectl logs NAME`  — stdout/stderr.
  - `kubectl exec -it NAME -- sh`  — shell inside.
  - `kubectl delete pod NAME`  — remove.
check:
  type: command
  cmd: "kubectl get pod hello-web -o jsonpath='{.status.phase}'"
  expect: "Running"
  timeout_seconds: 60
