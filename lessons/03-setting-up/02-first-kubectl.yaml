id: 03-setting-up/02-first-kubectl
title: "Your first kubectl commands"
module: setting-up
order: 2
estimated_minutes: 12
learning_goal: "Use kubectl verbs and flags to list nodes and Pods across namespaces."
prerequisites:
  - kind-local-cluster
  - kubectl-basics
intro: |
  # kubectl

  `kubectl` is the tool you use to talk to Kubernetes. The shape:

  ```
  kubectl <verb> <resource> [name] [flags]
  ```

  ## Common verbs

  - `get` — list resources (short form).
  - `describe` — long human-readable view of one resource.
  - `create` — make a new resource (with a name and image).
  - `apply` — send YAML to the cluster (create or update).
  - `delete` — remove a resource.
  - `logs` — read Pod logs.
  - `exec` — run a command inside a container.

  ## Common resources

  Every resource has short and long names:
  - `pods` / `pod` / `po`
  - `nodes` / `node` / `no`
  - `services` / `service` / `svc`
  - `deployments` / `deployment` / `deploy`
  - `configmaps` / `configmap` / `cm`

  See them all:
  ```
  kubectl api-resources
  ```

  ## Two very useful flags

  - `-n <namespace>` — talk to a specific namespace (default:
    `default`).
  - `-o wide` / `-o yaml` / `-o json` — richer output formats.

  ## Example (reference)

  ```
  kubectl get pods                       # in namespace 'default'
  kubectl get pods -A                    # in ALL namespaces
  kubectl get nodes -o wide              # nodes + IPs + OS + runtime
  kubectl describe node <node-name>      # everything about a node
  ```
task: |
  **Your goal:** explore the cluster with kubectl.

  Find and run commands that answer these:
  1. How many **nodes** does the cluster have, and are they all
     `Ready`?
  2. What **image** is on the first node (hint: it is a
     `kindest/node:...` image)?
  3. What is the internal IP of the node?
  4. List all Pods in **every** namespace (there are already many
     system Pods in `kube-system`).

  Then press `c`.
hint: |
  - Question 1: `kubectl get nodes` — column STATUS.
  - Question 2 and 3: `kubectl get nodes -o wide`, or `kubectl describe node <name>`.
  - Question 4: `kubectl get pods -A` (or `--all-namespaces`).
requires: [cluster]
cheat: |
  ### kubectl basics
  Shape: `kubectl <verb> <resource> [name] [flags]`

  **Verbs:** `get`, `describe`, `create`, `apply`, `delete`, `logs`, `exec`, `edit`, `patch`, `scale`, `rollout`.

  **Short names:** `po` (pods), `no` (nodes), `svc` (services), `deploy` (deployments), `cm` (configmaps), `rs` (replicasets), `sts` (statefulsets), `pvc` (persistentvolumeclaims), `ns` (namespaces).

  **Flags:**
  - `-n NS`  — namespace
  - `-A`     — all namespaces
  - `-o wide|yaml|json|name`  — output format
  - `-l KEY=VAL`  — label filter
  - `-w`     — watch (stream updates)
  - `--dry-run=client -o yaml`  — print YAML without applying

  `kubectl api-resources` lists everything.
warm_up:
  - prompt: "What does 'Kind' stand for?"
    answer: "Kubernetes IN Docker."
    kind: recall
    concept: kind-local-cluster
  - prompt: "Which command shows the current kubectl context?"
    answer: "`kubectl config current-context`."
    kind: recall
    concept: kubectl-basics
  - prompt: "What is a 'node' in a cluster?"
    answer: "One computer inside the cluster. It runs Pods."
    kind: recall
    concept: nodes
troubleshooting:
  scenario: |
    You just deployed an app into namespace `web`. Then you check:
    ```
    $ kubectl get pods
    No resources found in default namespace.
    ```
    But you know Pods should be there.
  question: "What is going on, and how do you see the Pods?"
  diagnosis: |
    `kubectl` uses the `default` namespace when you do not pass
    `-n`. Your Pods live in `web`, so `default` is empty.

    Two fixes:
    - Ask by namespace: `kubectl get pods -n web`
    - Or see all namespaces at once: `kubectl get pods -A`

    Tip: to avoid this all the time, set the default namespace of
    your context: `kubectl config set-context --current --namespace=web`.
  concept: kubectl-basics
review_questions:
  - prompt: "The shape of every kubectl command is:"
    kind: multiple_choice
    options:
      - "kubectl <resource> <verb> [flags]"
      - "kubectl <verb> <resource> [name] [flags]"
      - "kubectl <name> <verb> <resource>"
      - "kubectl <flags> <verb>"
    answer: "`kubectl <verb> <resource> [name] [flags]`. Verb first, then resource, then optional name and flags."
    concept: kubectl-basics
  - prompt: "Which flag shows Pods in ALL namespaces?"
    kind: recall
    answer: "`-A` (or `--all-namespaces`)."
    concept: kubectl-basics
  - prompt: "You want richer info on nodes: internal IP, OS, and container runtime. Which flag?"
    kind: scenario
    answer: "`-o wide`. So: `kubectl get nodes -o wide`."
    concept: kubectl-basics
  - prompt: "Short name for `deployments`?"
    kind: recall
    answer: "`deploy`. (`kubectl get deploy` works.)"
    concept: kubectl-basics
  - prompt: "You want to see every kind of resource kubectl knows about. Which command?"
    kind: recall
    answer: "`kubectl api-resources`."
    concept: kubectl-basics
common_mistakes:
  - mistake: "Forgetting `-n <namespace>` and thinking Pods are gone."
    fix: "Add `-n <namespace>` or `-A`. Or set the current namespace: `kubectl config set-context --current --namespace=<ns>`."
  - mistake: "Talking to the wrong cluster because the context is wrong."
    fix: "Run `kubectl config current-context` before big changes. Switch with `kubectl config use-context <name>`."
summary: |
  kubectl talks to Kubernetes with the shape verb + resource +
  name + flags. Learn `get`, `describe`, `apply`, `delete`, `logs`,
  `exec`. Learn `-n`, `-A`, and `-o wide`. Every hands-on lesson
  from here uses kubectl.
spaced_hooks:
  - concept: kubectl-basics
    when: next
  - concept: kubectl-basics
    when: "2-3"
  - concept: kubectl-basics
    when: capstone
check:
  type: command
  cmd: "kubectl get nodes --no-headers"
  expect: "Ready"
  timeout_seconds: 15
