id: 03-setting-up/02-first-kubectl
title: "Your first kubectl commands"
module: setting-up
order: 2
estimated_minutes: 12
intro: |
  # kubectl

  `kubectl` is the tool you use to talk to Kubernetes. The shape:

  ```
  kubectl <verb> <resource> [name] [flags]
  ```

  ## Common verbs

  - `get` — list resources (short form).
  - `describe` — long human-readable view of one resource.
  - `create` — make a new resource (with a name and image).
  - `apply` — send YAML to the cluster (create or update).
  - `delete` — remove a resource.
  - `logs` — read Pod logs.
  - `exec` — run a command inside a container.

  ## Common resources

  Every resource has short and long names:
  - `pods` / `pod` / `po`
  - `nodes` / `node` / `no`
  - `services` / `service` / `svc`
  - `deployments` / `deployment` / `deploy`
  - `configmaps` / `configmap` / `cm`

  See them all:
  ```
  kubectl api-resources
  ```

  ## Two very useful flags

  - `-n <namespace>` — talk to a specific namespace (default:
    `default`).
  - `-o wide` / `-o yaml` / `-o json` — richer output formats.

  ## Example (reference)

  ```
  kubectl get pods                       # in namespace 'default'
  kubectl get pods -A                    # in ALL namespaces
  kubectl get nodes -o wide              # nodes + IPs + OS + runtime
  kubectl describe node <node-name>      # everything about a node
  ```
task: |
  **Your goal:** explore the cluster with kubectl.

  Find and run commands that answer these:
  1. How many **nodes** does the cluster have, and are they all
     `Ready`?
  2. What **image** is on the first node (hint: it is a
     `kindest/node:...` image)?
  3. What is the internal IP of the node?
  4. List all Pods in **every** namespace (there are already many
     system Pods in `kube-system`).

  Then press `c`.
hint: |
  - Question 1: `kubectl get nodes` — column STATUS.
  - Question 2 and 3: `kubectl get nodes -o wide`, or `kubectl describe node <name>`.
  - Question 4: `kubectl get pods -A` (or `--all-namespaces`).
requires: [cluster]
cheat: |
  ### kubectl basics
  Shape: `kubectl <verb> <resource> [name] [flags]`

  **Verbs:** `get`, `describe`, `create`, `apply`, `delete`, `logs`, `exec`, `edit`, `patch`, `scale`, `rollout`.

  **Short names:** `po` (pods), `no` (nodes), `svc` (services), `deploy` (deployments), `cm` (configmaps), `rs` (replicasets), `sts` (statefulsets), `pvc` (persistentvolumeclaims), `ns` (namespaces).

  **Flags:**
  - `-n NS`  — namespace
  - `-A`     — all namespaces
  - `-o wide|yaml|json|name`  — output format
  - `-l KEY=VAL`  — label filter
  - `-w`     — watch (stream updates)
  - `--dry-run=client -o yaml`  — print YAML without applying

  `kubectl api-resources` lists everything.
check:
  type: command
  cmd: "kubectl get nodes --no-headers"
  expect: "Ready"
  timeout_seconds: 15
