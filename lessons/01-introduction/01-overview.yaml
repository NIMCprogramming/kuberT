intro: |
  # What is Kubernetes?

  Kubernetes (also called **K8s**) is a system to run apps in containers.

  It can:
  - run many containers across many computers
  - restart containers if they crash
  - balance traffic between them
  - scale up and down

  Why people use it:
  - your app keeps running even if one server dies
  - you can push updates with zero downtime
  - the same setup works on a laptop or 1000 servers

