intro: |
  # What is Kubernetes?

  Kubernetes is a tool that runs apps in containers.
  Many people call it **K8s** for short.

  Kubernetes can:
  - run many containers on many computers at the same time
  - start a container again if it stops working
  - share work between containers
  - add more containers when you need more, and remove them when you need less

  Why people use it:
  - Your app keeps running, even if one computer breaks.
  - You can change your app without stopping it for users.
  - The same setup works on a laptop or on 1000 computers.

