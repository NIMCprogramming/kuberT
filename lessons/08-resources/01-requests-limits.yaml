id: 08-resources/01-requests-limits
title: "Requests and Limits"
module: resources
order: 1
estimated_minutes: 12
intro: |
  # CPU and memory: requests and limits

  Every container can ask for CPU and memory. Two numbers matter:

  - **Request** — the amount the container **needs**. The
    scheduler uses this to pick a node. If no node has enough free
    CPU or memory, the Pod stays `Pending`.
  - **Limit** — the **max** the container can use. Above the CPU
    limit, the container is *throttled* (it just runs slower).
    Above the memory limit, Kubernetes **kills the container**
    (OOMKilled) and starts it again.

  Units:
  - CPU: `1` = one full core. `500m` = half a core (m = milli).
  - Memory: `128Mi`, `1Gi`, `500Mi` (Mi and Gi are base-1024).

  **Advice:** always set a request. Often set a limit too, but keep
  it a bit above the real peak so the app is not killed for a
  short spike.
task: |
  Make a Pod that asks for a tiny amount of CPU and memory.

  ```
  cat <<EOF | kubectl apply -f -
  apiVersion: v1
  kind: Pod
  metadata:
    name: sizer
  spec:
    containers:
      - name: c
        image: nginx
        resources:
          requests: { cpu: 50m, memory: 32Mi }
          limits:   { cpu: 200m, memory: 128Mi }
  EOF
  ```

  Wait until it is Running:

  ```
  kubectl get pod sizer
  ```

  Then press `c`.

  Clean up: `kubectl delete pod sizer`
hint: "kubectl describe pod sizer  -- see the Requests/Limits section"
requires: [cluster]
check:
  type: command
  cmd: "kubectl get pod sizer -o jsonpath='{.spec.containers[0].resources.requests.cpu}'"
  expect: "50m"
  timeout_seconds: 30
