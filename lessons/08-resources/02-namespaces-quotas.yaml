id: 08-resources/02-namespaces-quotas
title: "Namespaces and Quotas"
module: resources
order: 2
estimated_minutes: 18
intro: |
  # Namespaces

  A **Namespace** is a folder inside the cluster. It groups
  resources (Pods, Services, ConfigMaps, ...). Names must be
  unique inside a namespace.

  Common uses:
  - one namespace per team
  - one namespace per environment (`dev`, `stage`, `prod`)

  Every cluster has `default`, `kube-system`, `kube-public`.

  ## Working in a namespace

  Most commands take `-n <namespace>`:
  ```
  kubectl get pods -n demo
  kubectl run web --image=nginx -n demo
  ```

  Change your default for the current shell:
  ```
  kubectl config set-context --current --namespace=demo
  ```

  ## ResourceQuota — a spending cap

  A **ResourceQuota** limits how much a namespace can use in
  total.

  ```yaml
  apiVersion: v1
  kind: ResourceQuota
  metadata:
    name: NAME
    namespace: NS
  spec:
    hard:                       # HARD caps
      pods:            "5"      # never more than 5 Pods
      requests.cpu:    "500m"   # sum of Pod requests <= 500m
      requests.memory: 256Mi
      services:        "3"      # up to 3 Services
  ```

  **Big trap:** if a namespace has a ResourceQuota on CPU or
  memory, then **every new Pod must set requests and limits**, or
  the API refuses to create it.

task: |
  **Your goal:** build a small quota-controlled sandbox.

  Requirements:
  1. Create a namespace named **`sandbox`**.
  2. Inside `sandbox`, create a ResourceQuota named **`limits`**
     with:
     - `pods = 3`
     - `services = 2`
     - `requests.cpu = 300m`
     - `requests.memory = 200Mi`
  3. Try to create a Pod **without** any resources — this should
     be **rejected** by the API.
  4. Create a Pod **with** small requests — this should succeed.
  5. Press `c`.

  Clean up later: `kubectl delete namespace sandbox`. Deleting the
  namespace also deletes everything inside it.
hint: |
  - Namespace: `kubectl create namespace sandbox`.
  - Apply the ResourceQuota YAML with a heredoc, `namespace: sandbox` in metadata.
  - Rejected Pod (must fail):
    `kubectl run bad --image=nginx -n sandbox`  → expect an error mentioning "must specify".
  - Accepted Pod (with requests): use `--overrides` with a JSON that adds `resources.requests.cpu` and `resources.requests.memory`, or apply a YAML.
  - See usage: `kubectl describe resourcequota limits -n sandbox`.
requires: [cluster]
check:
  type: multiple
  checks:
    - type: command
      cmd: "kubectl get resourcequota limits -n sandbox -o jsonpath='{.spec.hard.pods}'"
      expect: "3"
    - type: command
      cmd: "kubectl get resourcequota limits -n sandbox -o jsonpath='{.spec.hard.services}'"
      expect: "2"
