id: 12-autoscaling/01-hpa
title: "Horizontal Pod Autoscaler (HPA)"
module: autoscaling
order: 1
estimated_minutes: 18
intro: |
  # HPA — add and remove Pods

  A **Horizontal Pod Autoscaler** watches a Deployment (or
  StatefulSet) and:
  - **adds** Pods when CPU (or another metric) is high
  - **removes** Pods when it drops

  ## Rules for HPA to work

  1. The target Pods **must** set `resources.requests.cpu`. HPA
     measures CPU as a percent of the request. No request → the
     percent is undefined → HPA shows `<unknown>`.
  2. The cluster must have **metrics-server** installed. On
     `kind` it is not installed by default. Your HPA object will
     exist and its **spec** will be correct, but the current
     reading stays `<unknown>` (that is OK for this lesson).

  ## Two ways to create an HPA

  **Imperative:**
  ```
  kubectl autoscale deployment NAME --min=N --max=M --cpu-percent=T
  ```
  - `autoscale deployment NAME` — target: Deployment `NAME`.
  - `--min=N`, `--max=M` — floor and ceiling for replicas.
  - `--cpu-percent=T` — target average CPU (percent of request).

  **Declarative** (YAML, works with more metric types):
  ```yaml
  apiVersion: autoscaling/v2
  kind: HorizontalPodAutoscaler
  metadata:
    name: NAME
  spec:
    scaleTargetRef:
      apiVersion: apps/v1
      kind: Deployment
      name: DEPLOY_NAME
    minReplicas: N
    maxReplicas: M
    metrics:
      - type: Resource
        resource:
          name: cpu
          target:
            type: Utilization
            averageUtilization: T
  ```

task: |
  **Your goal:** create a Deployment that HPA can actually manage
  (it must have a CPU request), then attach an HPA.

  Requirements:
  1. Create a Deployment named **`nginx-app`** with:
     - **1 replica**
     - image **`nginx`**
     - container CPU **request**: **`100m`**
     - container CPU **limit**: **`200m`**
  2. Wait until READY is `1/1`.
  3. Attach an HPA named **`nginx-app`** targeting the Deployment:
     - **min** replicas: **2**
     - **max** replicas: **5**
     - target CPU: **60%**
  4. Confirm the HPA exists and shows MINPODS 2, MAXPODS 5.
  5. Also confirm the Deployment now has at least 2 Pods (HPA
     bumped it to the floor).
  6. Press `c`.

  Clean up later: delete the HPA, then the Deployment.
hint: |
  - Deployment with a CPU request: use YAML with a heredoc. Add the resources block under `spec.template.spec.containers[0]`.
  - HPA imperatively:
    `kubectl autoscale deployment nginx-app --min=2 --max=5 --cpu-percent=60`
  - Check: `kubectl get hpa nginx-app` and `kubectl get deploy nginx-app`.
  - See the full HPA: `kubectl get hpa nginx-app -o yaml`.
requires: [cluster]
check:
  type: multiple
  checks:
    - type: command
      cmd: "kubectl get hpa nginx-app -o jsonpath='{.spec.minReplicas}'"
      expect: "2"
    - type: command
      cmd: "kubectl get hpa nginx-app -o jsonpath='{.spec.maxReplicas}'"
      expect: "5"
    - type: command
      cmd: "kubectl get deploy nginx-app -o jsonpath='{.spec.template.spec.containers[0].resources.requests.cpu}'"
      expect: "100m"
