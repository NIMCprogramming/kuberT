id: 12-autoscaling/01-hpa
title: "Horizontal Pod Autoscaler (HPA)"
module: autoscaling
order: 1
estimated_minutes: 15
intro: |
  # HPA — add and remove Pods

  A **Horizontal Pod Autoscaler** watches a Deployment (or
  StatefulSet) and:
  - **adds** Pods when CPU (or another metric) is high
  - **removes** Pods when it drops

  *"Horizontal"* = more copies of the same Pod, side by side.
  *"Vertical"* = making one Pod bigger (next lesson: VPA).

  ## What you must set

  - `minReplicas` — the floor (e.g. 1)
  - `maxReplicas` — the ceiling (e.g. 10)
  - a **target** — e.g. *"keep CPU near 60%"*

  The math: HPA looks at the average CPU across all Pods and
  compares it to the target. If CPU is higher, HPA adds Pods; if
  lower, it removes them. There are cooldown windows so it does
  not oscillate.

  ## The Pods MUST have a CPU request

  HPA measures CPU **relative to the Pod's request**. If the Pod
  has no `resources.requests.cpu`, HPA cannot compute a
  percentage and will show `<unknown>`. Always set a request.

  ## Metrics source

  HPA needs a metrics source. Almost always: **metrics-server**,
  a small add-on that lets you run `kubectl top pod`. On `kind`,
  metrics-server is **not installed by default**, so the HPA
  will be created and its rules will be visible, but the CPU
  reading stays `<unknown>` until you install metrics-server.

  ## Break `kubectl autoscale` apart

  ```
  kubectl autoscale deployment web --min=1 --max=5 --cpu-percent=60
  ```
  - `autoscale deployment web` — target is Deployment `web`.
  - `--min=1` — never fewer than 1 Pod.
  - `--max=5` — never more than 5.
  - `--cpu-percent=60` — target: average CPU 60% of the request.

task: |
  ### Step 1 — make a Deployment WITH a CPU request

  HPA needs the request to work. Make one:

  ```
  cat <<'EOF' | kubectl apply -f -
  apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: web
  spec:
    replicas: 1
    selector:
      matchLabels: { app: web }
    template:
      metadata:
        labels: { app: web }
      spec:
        containers:
          - name: nginx
            image: nginx
            resources:
              requests: { cpu: 100m, memory: 64Mi }
              limits:   { cpu: 200m, memory: 128Mi }
  EOF
  ```

  Wait for ready:
  ```
  kubectl get deploy web
  ```

  ### Step 2 — attach an HPA

  ```
  kubectl autoscale deployment web --min=1 --max=5 --cpu-percent=60
  ```

  Look at it:
  ```
  kubectl get hpa web
  ```

  You should see `MINPODS 1  MAXPODS 5  TARGETS ...` and probably
  `<unknown>` for CPU (metrics-server missing on kind).

  ### Step 3 — describe to see the rules

  ```
  kubectl describe hpa web
  ```

  You will see the target and the current reading.

  ### Step 4 — check

  Press `c`.

  Clean up later:
  ```
  kubectl delete hpa web
  kubectl delete deploy web
  ```
hint: "kubectl get hpa web -o yaml  -- see the full spec (behavior, metrics rules)"
requires: [cluster]
check:
  type: multiple
  checks:
    - type: command
      cmd: "kubectl get hpa web -o jsonpath='{.spec.maxReplicas}'"
      expect: "5"
    - type: command
      cmd: "kubectl get deploy web -o jsonpath='{.spec.template.spec.containers[0].resources.requests.cpu}'"
      expect: "100m"
