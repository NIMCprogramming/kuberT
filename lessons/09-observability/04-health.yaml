id: 09-observability/04-health
title: "Probes: liveness, readiness, startup"
module: observability
order: 4
estimated_minutes: 18
learning_goal: "Add liveness and readiness probes to a Pod and explain what each one does when it fails."
prerequisites:
  - pods
  - deployments
  - services
  - logs
intro: |
  # Health probes

  How does Kubernetes know if your app is alive? Probes.

  - **Liveness probe** — *"is the app still alive?"* Fail -> the
    container is **restarted**.
  - **Readiness probe** — *"is the app ready to serve traffic?"*
    Fail -> the Pod is **removed from the Service** (no traffic),
    but not restarted.
  - **Startup probe** — *"has the app finished starting?"* While
    it runs, liveness is paused. Use for slow-boot apps.

  ## Probe types

  Each probe can be one of:
  - `httpGet` — a URL returns 2xx or 3xx.
  - `tcpSocket` — a port accepts a TCP connection.
  - `exec` — a command inside the container exits `0`.

  ## Common fields

  ```yaml
  readinessProbe:
    httpGet:
      path: /
      port: 80
    initialDelaySeconds: 0    # wait N sec before the first probe
    periodSeconds:      5     # run the probe every 5 sec
    timeoutSeconds:     1     # each probe must answer in 1 sec
    failureThreshold:   3     # N failures in a row to fail
    successThreshold:   1     # N successes to pass
  ```

  ## Warning

  A too-strict **liveness** probe can cause **restart loops**. If
  your app boots in 30 s but the probe fails after 10 s,
  Kubernetes will restart it forever. Use a startup probe or a
  higher `initialDelaySeconds`.

warm_up:
  - prompt: "A Deployment keeps N Pods alive. If one Pod dies, what does the Deployment do?"
    answer: "It notices the missing replica and creates a new Pod (via its ReplicaSet) to reach N again."
    kind: recall
    concept: deployments
  - prompt: "What is a Service, in one sentence?"
    answer: "A stable name and IP that load-balances traffic to a set of Pods matched by labels."
    kind: recall
    concept: services
  - prompt: "You want to see the last error a container printed before it crashed. Which command?"
    answer: "`kubectl logs POD --previous` (or `-p`). It reads the previous container's stdout/stderr."
    kind: recall
    concept: logs
task: |
  **Your goal:** build a Pod with both a readiness probe (that
  passes) and a liveness probe (that also passes).

  Requirements:
  1. Create a Pod named **`checked`** with:
     - one container, image **`nginx`**
     - a **readinessProbe** using `httpGet` on `path: /` port
       **`80`**, `periodSeconds: 5`
     - a **livenessProbe** using `httpGet` on `path: /` port
       **`80`**, `periodSeconds: 10`, `initialDelaySeconds: 3`
  2. Wait until `ready` on the container is `true`.
  3. Confirm STATUS is `Running`.
  4. Press `c`.

  ## Bonus (optional)

  Make a **second** Pod named `broken` with the same readiness
  probe but on port `999`. It will never become Ready (`READY 0/1`).
  See the event: `kubectl describe pod broken | grep -A2 Readiness`.
  Then delete the broken Pod.

  Clean up later: delete `checked`.
hint: |
  - Use YAML with a heredoc. Add both probes under `spec.containers[0]`.
  - `readinessProbe` and `livenessProbe` sit next to `image:` in the container spec.
  - Check ready: `kubectl get pod checked -o jsonpath='{.status.containerStatuses[0].ready}'` should print `true`.
  - See the probes: `kubectl describe pod checked | grep -A3 -E 'Liveness|Readiness'`.
requires: [cluster]
troubleshooting:
  scenario: |
    Your app boots in 25 seconds. You added this liveness probe:
    ```yaml
    livenessProbe:
      httpGet: { path: /health, port: 8080 }
      initialDelaySeconds: 5
      periodSeconds: 5
      failureThreshold: 2
    ```
    `kubectl get pod app` shows:
    ```
    NAME   READY   STATUS             RESTARTS
    app    0/1     CrashLoopBackOff   6
    ```
  question: "Why is the container restarting forever, and how do you fix it?"
  diagnosis: |
    The liveness probe starts after 5 seconds and gives up after 2
    failures (about 10 seconds total). But the app needs 25
    seconds to boot. Kubernetes thinks the app is dead and
    restarts it — every time. That is a **restart loop**.

    Two fixes:
    1. Raise `initialDelaySeconds` to 30 on the liveness probe.
    2. Better: add a **startupProbe** that allows a long boot.
       While it runs, liveness is paused.

    ```yaml
    startupProbe:
      httpGet: { path: /health, port: 8080 }
      periodSeconds: 5
      failureThreshold: 12   # up to 60s to start
    ```
  concept: probes
review_questions:
  - prompt: "A readinessProbe fails. What does Kubernetes do?"
    kind: multiple_choice
    options:
      - "Restart the container"
      - "Delete the Pod"
      - "Remove the Pod from the Service (no traffic), but do not restart"
      - "Nothing"
    answer: "Remove the Pod from the Service. Traffic goes to other ready Pods. The container is NOT restarted."
    concept: probes
  - prompt: "You have a probe that runs a command inside the container. Which probe TYPE is that?"
    kind: recall
    answer: "`exec`. The probe passes if the command exits with code 0."
    concept: probes
  - prompt: "Your app takes 40 seconds to warm up. You want liveness to protect against a hang later, but not restart the app during boot. What do you add?"
    kind: scenario
    answer: "A `startupProbe`. While it runs, liveness is paused. Give it enough `periodSeconds * failureThreshold` to cover the 40-second boot."
    concept: probes
  - prompt: "Your Service points at a Deployment. One of three Pods keeps returning 503 from `/health`. Users still get errors sometimes. Which probe is missing or wrong?"
    kind: debug
    answer: "The **readiness** probe. If it were correct, the broken Pod would be removed from the Service and no user traffic would hit it. Add or fix `readinessProbe`."
    concept: probes
common_mistakes:
  - mistake: "Using the same URL for readiness and liveness and setting liveness too strict."
    fix: "Split them. Readiness should check dependencies (DB, cache). Liveness should be simple: is the process responsive?"
  - mistake: "Setting `initialDelaySeconds: 0` on a slow-boot app."
    fix: "Use a startupProbe for slow starts, or raise `initialDelaySeconds` on liveness."
  - mistake: "Forgetting the readiness probe. Traffic hits half-started Pods and users see 503."
    fix: "Add a readinessProbe on every serving Pod. It also lets rolling updates wait for new Pods before shifting traffic."
summary: |
  Probes tell Kubernetes what \"alive\" and \"ready\" mean for
  your app. Liveness restarts the container on failure.
  Readiness pulls the Pod out of the Service so no traffic hits
  it. Startup protects slow-boot apps from being killed too
  early. You will meet probes again with rolling updates and
  canary in module 13.
spaced_hooks:
