id: 09-observability/01-logs
title: "Logs"
module: observability
order: 1
estimated_minutes: 12
intro: |
  # Logs

  Anything a container writes to **stdout** or **stderr** is saved
  by Kubernetes as **logs**. You read them with `kubectl logs`.

  ## The shape

  ```
  kubectl logs TARGET [FLAGS]
  ```

  Common targets:
  - `POD_NAME` — the exact Pod.
  - `deploy/NAME` — the Deployment (kubectl picks one Pod).
  - `job/NAME` — a Job's Pod.

  Useful flags:
  - `-f` — **follow** (stream new lines). Ctrl+C to stop.
  - `--previous` — logs from the **previous** container (after a
    crash).
  - `-c CONTAINER` — pick a container in a multi-container Pod.
  - `--tail=N` — only the last N lines.
  - `--since=5m` — only recent.
  - `--all-containers` — logs from every container in the Pod.
  - `--timestamps` — add a timestamp to each line.

task: |
  **Your goal:** produce and read logs on purpose.

  Requirements:
  1. Create a Deployment named **`talker`** with **1 replica**,
     image **`busybox`**, whose container runs a shell loop that
     prints an incrementing counter every second, forever.
     Example line: `count=1`, `count=2`, ...
  2. Wait until READY is `1/1`.
  3. Read the **last 3 lines** of its logs.
  4. Stream logs live (`-f`) in one terminal. In another terminal
     delete the Pod. Watch the stream stop. Then the Deployment
     starts a new Pod — read logs again and confirm the counter
     started again from `count=1`.
  5. Read logs with `--previous` to see the last lines from the
     old (deleted) container.
  6. Press `c`.

  Clean up later: delete the Deployment.
hint: |
  - Simplest way to get a busybox loop into a Deployment YAML:
    ```
    command: ["sh", "-c", "i=1; while true; do echo count=$i; i=$((i+1)); sleep 1; done"]
    ```
    (Use `<<'EOF'` for the heredoc so `$i` and `$((...))` are NOT expanded by your shell.)
  - Last 3 lines: `kubectl logs deploy/talker --tail=3`.
  - Follow: `kubectl logs -f deploy/talker`.
  - After a Pod restart, `--previous` reads the OLD container:
    `kubectl logs <pod-name> --previous`.
requires: [cluster]
check:
  type: multiple
  checks:
    - type: command
      cmd: "kubectl get deploy talker -o jsonpath='{.status.readyReplicas}'"
      expect: "1"
      timeout_seconds: 120
    - type: command
      cmd: "kubectl logs deploy/talker --tail=3"
      expect: "count="
