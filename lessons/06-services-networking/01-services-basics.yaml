cheat: |
  ### Services
  Stable IP + DNS name in front of a group of Pods (picked by label).

  **Types:**
  - `ClusterIP` (default) — inside cluster only.
  - `NodePort` — opens a port on every node.
  - `LoadBalancer` — cloud gives a public IP.
  - Headless (`clusterIP: None`) — no cluster IP; DNS returns Pod IPs.

  **Commands:**
  - `kubectl expose deployment NAME --port=P --target-port=Q --name=SVC_NAME`
  - `kubectl get svc` / `kubectl get endpoints NAME`
  - `--port` = Service port (clients dial). `--target-port` = container port.

  **YAML:**
  ```yaml
  apiVersion: v1
  kind: Service
  metadata: { name: NAME }
  spec:
    type: ClusterIP
    selector: { app: MYAPP }
    ports:
      - { port: 8080, targetPort: 80, protocol: TCP }
  ```
check:
  type: multiple
  checks:
    - type: command
      cmd: "kubectl get deploy shop -o jsonpath='{.status.readyReplicas}'"
      expect: "3"
      timeout_seconds: 90
    - type: command
      cmd: "kubectl get svc shop-svc -o jsonpath='{.spec.ports[0].port}'"
      expect: "8080"
    - type: command
      cmd: "kubectl get svc shop-svc -o jsonpath='{.spec.ports[0].targetPort}'"
      expect: "80"
