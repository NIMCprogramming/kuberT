id: 06-services-networking/04-loadbalancer
title: "LoadBalancer and Ingress (with Traefik)"
module: services-networking
order: 4
estimated_minutes: 25
learning_goal: "Install Traefik with Helm, create an Ingress with a host rule, and reach a Service through the Ingress controller."
prerequisites:
  - services-clusterip
  - nodeport
  - helm
  - deployment
intro: |
  # LoadBalancer and Ingress

  A **LoadBalancer** Service asks the cloud (AWS/GCP/Azure) for a
  **public IP**. On a laptop cluster (`kind`, `minikube`), there
  is no cloud â€” the Service stays `<pending>` forever. That is
  why we usually use an **Ingress** on local clusters.

  ## Ingress

  An **Ingress** is smarter than one LoadBalancer per app:
  - One entry point (one IP or one hostname).
  - Routes traffic by **host** or **path** to different Services.

  An Ingress **resource** by itself does nothing. You need an
  **Ingress controller** running inside the cluster to make it
  work. Popular controllers:
  - **Traefik** (this lesson).
  - **ingress-nginx**.
  - **HAProxy Ingress**, **Contour**, ...

  ## Traefik in one picture

  ```
  curl -H "Host: myshop.local" http://<traefik-pod>
     â”‚
     â””â”€ Traefik reads the Host header
        â””â”€ Finds an Ingress with rules for myshop.local
           â””â”€ Sends the request to the matching Service
              â””â”€ Service picks a Pod
  ```

  ## Example YAML (Ingress)

  ```yaml
  apiVersion: networking.k8s.io/v1
  kind: Ingress
  metadata:
    name: NAME
    annotations:
      kubernetes.io/ingress.class: traefik   # or set spec.ingressClassName
  spec:
    ingressClassName: traefik
    rules:
      - host: MYHOST
        http:
          paths:
            - path: /
              pathType: Prefix
              backend:
                service:
                  name: SVC_NAME
                  port:
                    number: SVC_PORT
  ```
warm_up:
  - prompt: "What are the three main Service types?"
    answer: "`ClusterIP` (inside only), `NodePort` (port on every node), `LoadBalancer` (cloud gives a public IP)."
    kind: recall
    concept: services-clusterip
  - prompt: "On kind, why does a `LoadBalancer` Service stay `<pending>`?"
    answer: "There is no cloud provider to allocate a public IP. Kind runs in Docker on your laptop."
    kind: recall
    concept: nodeport
  - prompt: "You added a Helm repo and `helm install` says 'chart not found'. What did you skip?"
    answer: "`helm repo update`. Refresh the local chart index after adding a repo."
    kind: debug
    concept: helm
task: |
  **Your goal:** install Traefik, expose an app through it, and
  reach the app by **hostname**.

  ### Step 1 â€” install Traefik

  The easy way (Helm):
  ```
  helm repo add traefik https://traefik.github.io/charts
  helm repo update
  helm install traefik traefik/traefik --namespace kube-system
  ```

  If you do not have Helm, install it once:
  ```
  curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  ```

  Wait until Traefik is Ready:
  ```
  kubectl -n kube-system get deploy traefik
  kubectl -n kube-system rollout status deploy/traefik
  ```

  Confirm the IngressClass:
  ```
  kubectl get ingressclass
  ```
  You should see a class named **`traefik`**.

  ### Step 2 â€” create your app

  Requirements:
  - Deployment **`webshop`**, image **`nginx`**, **2 replicas**.
  - Service **`webshop`**, port **80**, target port **80**.

  You built things like this in the earlier lessons â€” do it
  yourself, no full command here.

  ### Step 3 â€” create the Ingress

  Requirements:
  - Ingress named **`webshop`**.
  - `ingressClassName: traefik`.
  - Host: **`myshop.local`**.
  - Path `/` (`pathType: Prefix`) â†’ Service `webshop` on port `80`.

  Apply the YAML.

  ### Step 4 â€” call the Ingress by hostname

  Two ways to test. Pick one.

  **A) From inside the cluster (works everywhere):**
  ```
  kubectl -n kube-system port-forward svc/traefik 8080:80 &
  curl -s -H "Host: myshop.local" -o /dev/null -w "%{http_code}\n" http://127.0.0.1:8080/
  kill %1
  ```

  **B) From a tester Pod (no port-forward):**
  ```
  kubectl run tester --rm -it --restart=Never --image=curlimages/curl -- \
    curl -s -o /dev/null -w "%{http_code}\n" \
      -H "Host: myshop.local" http://traefik.kube-system/
  ```

  You should see `200`. Then press `c`.

  ### Clean up later

  ```
  kubectl delete ingress webshop
  kubectl delete svc webshop
  kubectl delete deploy webshop
  helm -n kube-system uninstall traefik   # or delete the manifest
  ```
hint: |
  - Helm is a package manager for Kubernetes YAML. `helm install NAME CHART` installs a "release".
  - After installing Traefik, look at the Service: `kubectl -n kube-system get svc traefik`. Its type is `LoadBalancer` â€” on kind it stays `<pending>` (no cloud), but the ClusterIP works, so port-forward or the tester Pod still work.
  - Ingress YAML anchor: `spec.ingressClassName: traefik` AND `spec.rules[0].host: myshop.local`. Do not use the old annotation form.
  - If curl returns `404`, the Host header does not match. Double-check the value inside `-H "Host: myshop.local"`.
  - If the ingressclass is missing after install, wait a bit more, then `kubectl get ingressclass -A`.
requires: [cluster]
troubleshooting:
  scenario: |
    Traefik is Ready. Your Ingress is applied. curl returns `404
    Not Found`:
    ```
    $ curl -H "Host: myshop.local" http://127.0.0.1:8080/
    404 page not found
    ```
    Your Ingress:
    ```yaml
    spec:
      ingressClassName: nginx   # <-- note this
      rules:
        - host: myshop.local
          http:
            paths:
              - path: /
                pathType: Prefix
                backend:
                  service: { name: webshop, port: { number: 80 } }
    ```
  question: "Why does Traefik not route this?"
  diagnosis: |
    The Ingress says `ingressClassName: nginx`, but the only
    controller running is Traefik (class `traefik`). Traefik
    ignores Ingresses that belong to other classes, so nothing
    routes to your Service.

    How to see it:
    - `kubectl get ingressclass` â€” lists installed classes.
    - `kubectl describe ingress webshop` â€” the class is at the
      top; Address stays empty.

    Fix: `ingressClassName: traefik` and re-apply.
  concept: ingress
review_questions:
  - prompt: "What happens to a `type: LoadBalancer` Service on `kind` without extra tools?"
    kind: multiple_choice
    options:
      - "It gets a public IP from the kind network"
      - "It stays `<pending>` forever (no cloud provider)"
      - "It falls back to NodePort automatically"
      - "It fails with an error"
    answer: "It stays `<pending>` forever (no cloud provider)."
    concept: ingress
  - prompt: "An Ingress resource is applied but nothing happens. What must exist too?"
    kind: recall
    answer: "An Ingress **controller** (like Traefik or ingress-nginx) running in the cluster. The Ingress resource alone is just a rule; the controller reads it and does the routing."
    concept: ingress
  - prompt: "curl to the Ingress returns 404 but the Service works when you call it directly. First thing to check?"
    kind: debug
    answer: "The `Host:` header your request sends vs `spec.rules[0].host`. Mismatch = the controller has no rule for that hostname and returns 404."
    concept: ingress
  - prompt: "You want the same Ingress controller to serve two apps at different paths. How?"
    kind: scenario
    answer: "One Ingress with two `paths` entries, each pointing to a different Service. Or two Ingress resources with different `host`/`path` â€” the controller merges them."
    concept: ingress
common_mistakes:
  - mistake: "Wrong `ingressClassName` (e.g. `nginx` when only Traefik is installed)."
    fix: "List classes with `kubectl get ingressclass`. Use one that has a running controller."
  - mistake: "Testing without a `Host:` header. Traefik returns 404 because no rule matches an empty host."
    fix: "Always send `-H \"Host: myshop.local\"` when the Ingress rule pins a host."
  - mistake: "Expecting a public IP on kind's LoadBalancer Service."
    fix: "Use `port-forward`, a tester Pod, or install MetalLB for LoadBalancer to work on kind."
summary: |
  On the cloud, `type: LoadBalancer` gets you a public IP. On
  kind, you install an Ingress controller (Traefik) and route
  traffic by host/path with an Ingress resource. Get the
  `ingressClassName` and `Host:` header right and the app is
  live.
