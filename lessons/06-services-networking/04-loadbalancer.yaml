cheat: |
  ### LoadBalancer and Ingress
  - `type: LoadBalancer` â€” asks the **cloud** for a public IP. On kind: stays `<pending>`.
  - **Ingress** â€” one entry point, many rules by host/path. Needs a **controller** (Traefik, ingress-nginx, ...).
  - Install Traefik via Helm:
    ```
    helm repo add traefik https://traefik.github.io/charts
    helm install traefik traefik/traefik -n kube-system
    ```
  - Ingress YAML sketch:
    ```yaml
    apiVersion: networking.k8s.io/v1
    kind: Ingress
    spec:
      ingressClassName: traefik
      rules:
        - host: myshop.local
          http:
            paths:
              - path: /
                pathType: Prefix
                backend: { service: { name: shop, port: { number: 8080 } } }
    ```
  - Test with `Host:` header:
    `curl -H "Host: myshop.local" http://<traefik-ip>/`
  - Local access on kind:
    `kubectl -n kube-system port-forward svc/traefik 8080:80`
check:
  type: multiple
  checks:
    - type: command
      cmd: "kubectl get ingressclass traefik -o jsonpath='{.metadata.name}'"
      expect: "traefik"
    - type: command
      cmd: "kubectl get ingress webshop -o jsonpath='{.spec.rules[0].host}'"
      expect: "myshop.local"
    - type: command
      cmd: "kubectl get svc webshop -o jsonpath='{.spec.ports[0].port}'"
      expect: "80"
