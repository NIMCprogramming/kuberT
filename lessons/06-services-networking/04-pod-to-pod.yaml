id: 06-services-networking/04-pod-to-pod
title: "Pod-to-Pod networking"
module: services-networking
order: 4
estimated_minutes: 12
intro: |
  # How Pods talk to each other

  Inside a cluster, the rules are simple:
  - Every Pod has its own IP.
  - Every Pod can reach every other Pod by IP, on any port.
  - No NAT between Pods.

  But you should **not** call Pods by IP — IPs change. Use the
  **Service name** instead.

  ## DNS names inside the cluster

  Kubernetes runs a small DNS server. When you make a Service
  `web` in namespace `default`, three names work:

  ```
  http://web                            # same namespace
  http://web.default                    # any namespace, short form
  http://web.default.svc.cluster.local  # long, always works
  ```

  For cross-namespace calls you need the second form (or the third).

  ## The tester Pod pattern

  A very useful trick for debugging: start a Pod with `curl`
  inside, run one command, and let it clean itself up:
  ```
  kubectl run tester --rm -it --restart=Never --image=curlimages/curl -- \
    curl -sv http://web
  ```
  - `--rm` — delete the Pod when it finishes.
  - `-it` — attach an interactive terminal.
  - `--restart=Never` — make a plain Pod (not a Deployment).
  - `--image=curlimages/curl` — a tiny image with `curl` built in.
  - Everything after `--` is the command to run.

task: |
  Two experiments — with the Service name, and with the Pod IP.

  ### Experiment 1 — call by Service name

  You should already have a `web` Service. If not, run
  `kubectl create deployment web --image=nginx --replicas=2` then
  `kubectl expose deployment web --port=80 --target-port=80`.

  ```
  kubectl run tester --rm -it --restart=Never --image=curlimages/curl -- \
    curl -s -o /dev/null -w "%{http_code}\n" http://web
  ```

  You should see `200`.

  ### Experiment 2 — call one Pod by IP

  Get one Pod IP:
  ```
  kubectl get pod -l app=web -o wide
  ```

  Copy an IP (like `10.244.0.5`). Then:
  ```
  kubectl run tester --rm -it --restart=Never --image=curlimages/curl -- \
    curl -s -o /dev/null -w "%{http_code}\n" http://10.244.0.5
  ```

  Also `200`. This shows every Pod is reachable by IP. But if you
  delete that Pod, the IP dies with it. That is why you use the
  Service name in real code.

  When both work, press `c`.
hint: "If DNS fails: kubectl get svc web  -- and check ENDPOINTS are not empty"
requires: [cluster]
check:
  type: command
  cmd: "kubectl get svc web -o jsonpath='{.spec.clusterIP}'"
  expect: "."
  timeout_seconds: 15
